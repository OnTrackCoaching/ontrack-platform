/* ── AUTO-PROVISION: creates mos/{uid} on first login ── */
async function provisionMOS(uid) {
  if (!db || !uid) return;
  try {
    const ref = db.collection("mos").doc(uid);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        courses: MOS_INIT_COURSES,
        extraEvents: [],
        weeklyTasks: {},
        notes: "",
        xp: 0,
        completedCount: 0,
        streak: 0,
        lastActiveDate: "",
        aiUsed: false,
        achievements: [],
        weekGoals: INIT_GOALS,
        stickyNotes: [],
        toolboxFiles: [],
        sharedEmails: [],
        provisionedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  } catch(e) { console.error("MOS provision error:", e); }
}

/* ── MOS PANEL (Firebase-backed, used in student portal & coach view) ── */
function MosPanel({uid, readOnly, viewerLabel=""}) {
  const [mosTab,setMosTab]=useState("dashboard");
  const [courses,setCourses]=useState(MOS_INIT_COURSES);
  const [extraEvents,setExtraEvents]=useState([]);
  const [weeklyTasks,setWeeklyTasks]=useState({});
  const [mosNotes,setMosNotesState]=useState("");
  const [xp,setXp]=useState(0);
  const [completedCount,setCompleted]=useState(0);
  const [streak,setStreak]=useState(0);
  const [achievements,setAchievements]=useState([]);
  const [hadNote,setHadNote]=useState(false);
  const [mosToast,setMosToast]=useState(null);
  const [showTimer,setShowTimer]=useState(false);
  const [aiUsed,setAiUsed]=useState(false);
  const [weekGoals,setWeekGoals]=useState(INIT_GOALS);
  const [toolboxFiles,setToolboxFiles]=useState([]);
  const [stickyNotes,setStickyNotes]=useState([]);
  const [lastActiveDate,setLastActiveDate]=useState("");
  const [loading,setLoading]=useState(true);
  const saveTimer=useRef(null);
  const streakChecked=useRef(false); // prevents streak logic from running more than once per session

  // Load from Firebase
  useEffect(()=>{
    let cancelled=false; // guard against state updates if uid changes while request is in flight
    streakChecked.current=false; // reset on uid change so streak is recalculated for new uid
    if(!uid||!db){setLoading(false);return;}
    db.collection("mos").doc(uid).get().then(snap=>{
      if(cancelled)return;
      if(snap.exists){
        const d=snap.data();
        if(d.courses)setCourses(d.courses);
        if(d.extraEvents)setExtraEvents(d.extraEvents);
        if(d.weeklyTasks)setWeeklyTasks(d.weeklyTasks);
        if(d.notes!==undefined)setMosNotesState(d.notes);
        if(d.xp!==undefined)setXp(d.xp);
        if(d.completedCount!==undefined)setCompleted(d.completedCount);
        if(d.streak!==undefined)setStreak(d.streak);
        if(d.achievements)setAchievements(d.achievements);
        if(d.hadNote!==undefined)setHadNote(d.hadNote);
        if(d.weekGoals)setWeekGoals(d.weekGoals);
        if(d.stickyNotes)setStickyNotes(d.stickyNotes);
        if(d.toolboxFiles)setToolboxFiles(d.toolboxFiles);
        if(d.lastActiveDate!==undefined)setLastActiveDate(d.lastActiveDate||"");
        if(d.aiUsed!==undefined)setAiUsed(d.aiUsed);
      }
      setLoading(false);
    }).catch(()=>{if(!cancelled)setLoading(false);});
    return()=>{cancelled=true;};
  },[uid]);

  // Debounced auto-save to Firebase
  useEffect(()=>{
    if(loading||readOnly||!uid||!db)return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{
        // Build save payload — strip sylFileData if doc would exceed Firestore 1MB
        const coursesStripped=courses.map(({sylFileData,...rest})=>rest);
        const base={courses:coursesStripped,extraEvents,weeklyTasks,notes:mosNotes,
          xp,completedCount,streak,lastActiveDate,aiUsed,achievements,hadNote,weekGoals,stickyNotes,toolboxFiles,
          lastSaved:firebase.firestore.FieldValue.serverTimestamp()};
        const full={...base,courses}; // courses with sylFileData
        let payload=JSON.stringify(full).length<900000?full:base;
        if(payload===base)console.warn("MOS: sylFileData stripped to stay under Firestore 1MB limit. Re-upload syllabi to view them.");
        // Second-tier: if still over limit (large toolboxFiles), strip toolboxFiles too
        if(JSON.stringify(payload).length>=900000){
          payload={...payload,toolboxFiles:[]};
          console.warn("MOS: toolboxFiles also stripped — total document too large. Reduce file sizes in Tool Box.");
        }
        await db.collection("mos").doc(uid).set(payload,{merge:true});
      }catch(e){console.error("MOS save:",e);}
    },800);
    return()=>clearTimeout(saveTimer.current);
  },[courses,extraEvents,weeklyTasks,mosNotes,xp,completedCount,streak,lastActiveDate,aiUsed,achievements,hadNote,weekGoals,stickyNotes,toolboxFiles,loading,readOnly,uid]);

  // If readOnly viewer somehow has AI tab active, redirect to dashboard
  useEffect(()=>{
    if(readOnly&&mosTab==="ai")setMosTab("dashboard");
  },[readOnly,mosTab]);

  const showMosToast=useCallback((msg)=>{setMosToast(msg);setTimeout(()=>setMosToast(null),3500);},[]);
  const awardXP=useCallback((amt,msg)=>{if(readOnly)return;setXp(p=>p+amt);showMosToast(msg||`+${amt} XP! 🎉`);},[readOnly,showMosToast]);
  const updateCourse=useCallback((id,u)=>{
    if(readOnly)return;
    // u may be an object (partial update) or a function (receives current course, returns partial)
    setCourses(prev=>prev.map(c=>c.id===id?{...c,...(typeof u==="function"?u(c):u)}:c));
  },[readOnly]);

  // Streak tracking — runs once per session after data loads from Firestore
  useEffect(()=>{
    if(loading||readOnly||streakChecked.current)return;
    streakChecked.current=true;
    const today=todayYMD();
    if(lastActiveDate===today)return; // already counted today's visit
    const prevDay=new Date();
    prevDay.setDate(prevDay.getDate()-1);
    const yesterdayStr=dateToYMD(prevDay);
    if(!lastActiveDate){
      setStreak(1); // first ever session
    } else if(lastActiveDate===yesterdayStr){
      setStreak(s=>s+1); // consecutive day — extend streak
    } else {
      setStreak(1); // gap in visits — restart streak
    }
    setLastActiveDate(today);
  },[loading,readOnly,lastActiveDate]);

  // Keep completedCount in sync with actual done tasks across all weeks
  useEffect(()=>{
    if(readOnly||loading)return;
    const done=Object.values(weeklyTasks).flat().filter(t=>t.done).length;
    setCompleted(done);
  },[weeklyTasks,readOnly,loading]);

  const processingAchRef=useRef(new Set()); // prevents double-award between state propagations

  // Achievement checking — runs whenever relevant state changes
  useEffect(()=>{
    if(readOnly||loading)return;
    const done=Object.values(weeklyTasks).flat().filter(t=>t.done).length;
    const sylCount=courses.filter(c=>c.sylUploaded).length;
    const gpaVal=calcGPA(courses);
    const checks=[
      {id:"first_task", earned:done>=1},
      {id:"task_10",    earned:done>=10},
      {id:"task_50",    earned:done>=50},
      {id:"syl_1",      earned:sylCount>=1},
      {id:"all_syl",    earned:sylCount>=7},
      {id:"streak_7",   earned:streak>=7},
      {id:"gpa_35",     earned:!!gpaVal&&parseFloat(gpaVal)>=3.5},
      {id:"ai_chat",    earned:aiUsed},
    ];
    // Filter out already earned AND currently processing (ref guard prevents double-award)
    const newOnes=checks.filter(c=>c.earned&&!achievements.includes(c.id)&&!processingAchRef.current.has(c.id)).map(c=>c.id);
    if(newOnes.length>0){
      newOnes.forEach(id=>processingAchRef.current.add(id)); // mark processing before async state update
      setAchievements(prev=>[...new Set([...prev,...newOnes])]);
      newOnes.forEach((id,i)=>{
        const a=ACHIEV.find(x=>x.id===id);
        if(a){
          setXp(p=>p+a.xp);
          // Stagger by full display duration so each toast gets its entire 3500ms window
          setTimeout(()=>showMosToast(`${a.icon} ${a.title} unlocked! +${a.xp} XP!`),i*4000);
        }
      });
    }
  },[weeklyTasks,courses,streak,aiUsed,achievements,readOnly,loading,showMosToast]);
  const addGradeEntry=(cid)=>updateCourse(cid,
    course=>({grades:[...(course.grades||[]),{id:Date.now()+"_"+Math.random().toString(36).slice(2,6),name:"Assignment",weight:10,score:"",maxScore:100}]}));
  const updGrade=(cid,gid,f)=>updateCourse(cid,course=>({grades:(course.grades||[]).map(g=>g.id===gid?{...g,...f}:g)}));
  const remGrade=(cid,gid)=>updateCourse(cid,course=>({grades:(course.grades||[]).filter(g=>g.id!==gid)}));
  const addReminder=(r)=>{if(!readOnly)setExtraEvents(prev=>[...prev,r]);};
  const setMosNotes=(n)=>{if(readOnly)return;setMosNotesState(n);if(!hadNote&&n.length>5){setHadNote(true);awardXP(50,"📝 First note! +50 XP!");}};
  const handleAiTab=()=>{setMosTab("ai");if(!aiUsed){setAiUsed(true);awardXP(75,"🤖 AI Coach activated! +75 XP!");}};
  const allEv=[...SU_EVENTS,...extraEvents,...courses.flatMap(c=>(c.events||[]).map(e=>({...e,courseName:c.name,courseAcc:(CCOLS[c.ci]||CCOLS[0]).a})))];
  const gpa=calcGPA(courses);
  const lvl=Math.floor(xp/500)+1;
  const xpPct=((xp%500)/500)*100;

  // In readOnly mode (shared viewer), hide AI Coach — no API access for shared contacts
  const MOS_TABS=[
    {id:"dashboard",l:"🏠 Dashboard"},
    {id:"courses",l:"📚 Courses"},
    {id:"calendar",l:"📅 Calendar"},
    {id:"planner",l:"📋 Weekly Plan"},
    {id:"grades",l:"🎓 Grades"},
    ...(!readOnly?[{id:"ai",l:"🤖 AI Coach"}]:[]),
    {id:"mosNotes",l:"📝 Notes"},
    {id:"toolbox",l:"🧰 My Tool Box"},
  ];

  if(loading)return(
    <div style={{padding:32,textAlign:"center",color:"var(--muted)"}}>
      <div style={{fontSize:30,marginBottom:10,animation:"spin 1.2s linear infinite",display:"inline-block"}}>🍊</div>
      <div style={{fontFamily:"'DM Serif Display',serif",fontSize:15}}>Loading MyOrangeSuccess...</div>
    </div>
  );

  return(
    <div style={{background:"#0d1117",borderRadius:10,overflow:"hidden",border:"1px solid #30363d",marginTop:4}}>
      {mosToast&&<MosToast msg={mosToast} onClose={()=>setMosToast(null)}/>}
      {showTimer&&<TimerWidget onClose={()=>setShowTimer(false)} showToast={showMosToast}/>}
      {!readOnly&&<StickyNotesLayer notes={stickyNotes} setNotes={setStickyNotes}/>}

      {/* MOS Header */}
      <div style={{background:`linear-gradient(135deg,${NAVY},#003a7d)`,borderBottom:`3px solid ${O}`,padding:"0 16px",height:50,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🍊</span>
          <div>
            <div style={{fontSize:14,fontWeight:900,color:O}}>MY ORANGE SUCCESS</div>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.4)",letterSpacing:1}}>SYRACUSE UNIVERSITY · 36-WEEK PLANNER{readOnly?(viewerLabel?" · "+viewerLabel:" · READ ONLY"):""}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(255,255,255,0.08)",borderRadius:12,padding:"3px 9px",fontSize:10}}>
            <span style={{color:O,fontWeight:800}}>LVL {lvl}</span>
            <div style={{width:44,height:4,background:"#30363d",borderRadius:2,overflow:"hidden"}}>
              <div style={{width:xpPct+"%",height:"100%",background:`linear-gradient(90deg,${O},#ff9a3c)`,borderRadius:2}}/>
            </div>
            <span style={{color:O,fontWeight:700}}>{xp} XP</span>
          </div>
          {gpa&&<div style={{background:`linear-gradient(135deg,${O},#ff9a3c)`,borderRadius:12,padding:"2px 9px",fontWeight:900,fontSize:11}}>GPA {gpa}</div>}
          {!readOnly&&<button onClick={()=>setShowTimer(!showTimer)} style={{background:showTimer?O:"rgba(255,255,255,0.1)",border:`1px solid ${showTimer?O:"#30363d"}`,color:"#fff",borderRadius:7,padding:"3px 9px",cursor:"pointer",fontSize:10,fontWeight:700}}>⏱ Timer</button>}
        </div>
      </div>

      {/* MOS Nav Tabs */}
      <nav style={{background:"#13131f",borderBottom:"1px solid #30363d",display:"flex",overflowX:"auto",padding:"0 8px"}}>
        {MOS_TABS.map(t=>(
          <button key={t.id} onClick={t.id==="ai"?handleAiTab:()=>setMosTab(t.id)} style={{
            padding:"8px 13px",background:"transparent",border:"none",cursor:"pointer",
            color:mosTab===t.id?O:"#8b949e",
            borderBottom:mosTab===t.id?`2px solid ${O}`:"2px solid transparent",
            fontWeight:mosTab===t.id?700:400,fontSize:11,whiteSpace:"nowrap",
          }}>{t.l}</button>
        ))}
      </nav>

      {/* MOS Content */}
      <div style={{padding:14,color:"#e6edf3"}}>
        {mosTab==="dashboard"&&<MosDashboard courses={courses} extraEvents={extraEvents} xp={xp} completedCount={completedCount} streak={streak} achievements={achievements} gpa={gpa} goals={weekGoals} setGoals={readOnly?()=>{}:setWeekGoals}/>}
        {mosTab==="courses"&&<div>
          <div style={{fontWeight:700,color:O,fontSize:13,marginBottom:12}}>📚 My Courses — {courses.filter(c=>c.sylUploaded).length}/7 syllabi uploaded</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(370px,1fr))",gap:10}}>
            {courses.map(c=><CourseCard key={c.id} course={c} onUpdate={readOnly?()=>{}:u=>updateCourse(c.id,u)} showToast={showMosToast} awardXP={awardXP}/>)}
          </div>
        </div>}
        {mosTab==="calendar"&&<Calendar courses={courses} extraEvents={extraEvents} onAddReminder={addReminder} showToast={showMosToast}/>}
        {mosTab==="planner"&&<WeeklyPlanner courses={courses} weeklyTasks={weeklyTasks} setWeeklyTasks={readOnly?()=>{}:setWeeklyTasks} showToast={showMosToast}/>}
        {mosTab==="grades"&&<GradeTracker courses={courses} gpa={gpa} addGradeEntry={readOnly?()=>{}:addGradeEntry} updGrade={readOnly?()=>{}:updGrade} remGrade={readOnly?()=>{}:remGrade}/>}
        {mosTab==="ai"&&<AIChat courses={courses} allEvents={allEv}/>}
        {mosTab==="mosNotes"&&<MosNotesPanel notes={mosNotes} setNotes={setMosNotes} awardXP={awardXP} hadNote={hadNote} readOnly={readOnly}/>}
        {mosTab==="toolbox"&&<ToolBox files={toolboxFiles} setFiles={readOnly?()=>{}:setToolboxFiles} showToast={showMosToast} readOnly={readOnly}/>}
      </div>
    </div>
  );
}



function StudentFileViewer({student,onClose,showToast}){
  const [data,setData]=useState(null);
  const [saving,setSaving]=useState(false);
  const [tab,setTab]=useState("profile");

  useEffect(()=>{
    if(!student?.uid){
      // Student hasn't linked their account yet — show editable roster shell
      setData({...INIT_STUDENT,profile:{...INIT_STUDENT.profile,name:student?.name||"",studentId:student?.studentId||""}});
      return;
    }
    const unsub=db.collection("students").doc(student.uid)
      .onSnapshot(
        snap=>{
          if(snap.exists){
            const raw=snap.data();
            setData({
              ...INIT_STUDENT,
              ...raw,
              profile:{...INIT_STUDENT.profile,...(raw.profile||{})},
              goals:Array.isArray(raw.goals)?raw.goals:INIT_STUDENT.goals,
              appointments:Array.isArray(raw.appointments)?raw.appointments:INIT_STUDENT.appointments,
              sharedWith:Array.isArray(raw.sharedWith)?raw.sharedWith:INIT_STUDENT.sharedWith,
            });
          }else setData({...INIT_STUDENT,profile:{...INIT_STUDENT.profile,name:student.name||"",studentId:student.studentId||""}});
        },
        err=>{
          console.error("StudentFileViewer read error:",err);
          setData({...INIT_STUDENT,profile:{...INIT_STUDENT.profile,name:student.name||"",studentId:student.studentId||""}});
        }
      );
    return()=>unsub();
  },[student?.uid]);

  const save=async(patch)=>{
    if(!db||!student?.uid){showToast("⚠️ Student hasn't registered yet — profile edits can be saved once they log in.");return;}
    setSaving(true);
    try{
      await db.collection("students").doc(student.uid).set({...data,...patch},{merge:true});
      if(patch)setData(p=>({...p,...patch}));
      showToast("✅ Saved!");
    }catch(e){showToast("Save failed: "+e.message);}
    finally{setSaving(false);}
  };

  const updProfile=(k,v)=>setData(p=>({...p,profile:{...p.profile,[k]:v}}));
  const updGoal=(id,k,v)=>setData(p=>({...p,goals:(p.goals||[]).map(g=>g.id===id?{...g,[k]:v}:g)}));

  if(!data)return<div style={{padding:20,color:"var(--muted)"}}>Loading student data...</div>;

  const pi={background:"var(--s2)",border:"1px solid var(--bdr)",color:"var(--txt)",borderRadius:7,padding:"8px 11px",fontSize:12,width:"100%"};
  const STATUS_MAP={not_started:{l:"Not Started",c:"#6b82a8"},urgent:{l:"🚨 Urgent",c:"#ef4444"},started:{l:"🔄 Started",c:"#fbbf24"},completed:{l:"✅ Completed",c:"#34d399"}};

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <button className="btn btn-ghost btn-sm" onClick={onClose}>← Back</button>
        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18}}>{student.name||"Student File"}</div>
        {student.studentId&&<div className="tag" style={{background:O+"18",border:`1px solid ${O}33`,color:O}}>ID: {student.studentId}</div>}
        {/* Last portal visit — coach-only visibility */}
        <div style={{marginLeft:4,display:"flex",alignItems:"center",gap:5,background:"var(--s2)",border:"1px solid var(--bdr)",borderRadius:7,padding:"4px 10px"}}>
          <span style={{fontSize:12}}>🕐</span>
          <div>
            <div style={{fontSize:9,color:"var(--dim)",fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>Last Portal Visit</div>
            <div style={{fontSize:11,fontWeight:600,color:data.lastPortalVisit?"var(--green)":"var(--muted)"}}>
              {data.lastPortalVisit?ts2str(data.lastPortalVisit):student.uid?"Never logged in":"Not registered yet"}
            </div>
          </div>
        </div>
        <button className="btn btn-primary btn-sm" style={{marginLeft:"auto"}} disabled={saving} onClick={()=>save(data)}>
          {saving?"Saving...":"💾 Save All"}
        </button>
      </div>

      <div className="stab-bar">
        {["profile","goals","appointments","notes","sessions","mos"].map(t=>(
          <button key={t} className={`stab${tab===t?" active":""}`} onClick={()=>setTab(t)}>
            {t==="profile"?"👤 Profile":t==="goals"?"🎯 Goals":t==="appointments"?"📆 Appointments":t==="notes"?"📝 Notes":t==="sessions"?"📋 Session Notes":"🍊 MyOrangeSuccess"}
          </button>
        ))}
      </div>

      {tab==="profile"&&<div className="fade">
        <div className="card">
          <div className="card-title">Student Information</div>
          <div className="g2" style={{marginBottom:10}}>
            {[["name","Full Name"],["studentId","Student ID"],["cell","Cell Phone"],["dorm","Dorm / Residence"],["major","Major"],["year","Year"]].map(([k,l])=>(
              <div key={k} className="fg">
                <div className="lbl">{l}</div>
                <input style={pi} value={data.profile[k]||""} onChange={e=>updProfile(k,e.target.value)} spellCheck={k==="name"||k==="major"}/>
              </div>
            ))}
          </div>
          <div className="divider"/>
          <div style={{fontWeight:700,fontSize:12,color:"var(--blue)",marginBottom:10}}>Parent / Guardian Contact</div>
          <div className="g2">
            {[1,2].map(n=>(
              <div key={n} style={{background:"var(--s2)",borderRadius:8,padding:"10px 12px",border:"1px solid var(--bdr)"}}>
                <div style={{fontSize:10,color:"var(--blue)",fontWeight:700,marginBottom:8}}>Parent / Guardian {n}</div>
                {[["Name","Name"],["Cell","Cell"],["Email","Email"]].map(([sf,l])=>(
                  <div key={sf} className="fg">
                    <div className="lbl">{l}</div>
                    <input style={{...pi,padding:"6px 10px",fontSize:11}} value={data.profile[`parent${n}${sf}`]||""} onChange={e=>updProfile(`parent${n}${sf}`,e.target.value)}/>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
        <div style={{marginTop:4}}>
          <button className="btn btn-primary" onClick={()=>save({profile:data.profile})}>💾 Save Profile</button>
        </div>
      </div>}

      {tab==="goals"&&<div className="fade">
        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:15,marginBottom:12}}>Weekly Goals — {data.profile.name||"Student"}</div>
        {(data.goals||[]).map((g,i)=>{
          const st=STATUS_MAP[g.status]||STATUS_MAP.not_started;
          return(
            <div key={g.id} className="card" style={{borderLeft:`3px solid ${st.c}`,padding:"14px 16px",marginBottom:10}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:st.c,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                <input style={{...pi,background:"transparent",border:"none",borderBottom:"1px solid var(--bdr)",borderRadius:0,fontWeight:700,flex:1}} value={g.title||""} onChange={e=>updGoal(g.id,"title",e.target.value)} placeholder={`Goal ${i+1}...`} spellCheck/>
                <select style={{...pi,width:"auto",color:st.c,border:`1px solid ${st.c}55`,fontSize:11}} value={g.status} onChange={e=>updGoal(g.id,"status",e.target.value)}>
                  {Object.entries(STATUS_MAP).map(([v,x])=><option key={v} value={v}>{x.l}</option>)}
                </select>
                <input type="date" style={{...pi,width:"auto",fontSize:11}} value={g.completionDate||""} onChange={e=>updGoal(g.id,"completionDate",e.target.value)}/>
              </div>
              {g.expanded&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  {[["steps","📋 Steps"],["location","📍 Location"],["supportsRequired","🤝 Supports"],["outcomeExpectations","🎓 Outcome"],["reflection","✏️ Reflection"]].map(([k,l])=>(
                    <div key={k} style={k==="reflection"?{gridColumn:"1/-1"}:{}}>
                      <div className="lbl">{l}</div>
                      {k==="location"
                        ?<input style={pi} value={g[k]||""} onChange={e=>updGoal(g.id,k,e.target.value)} spellCheck/>
                        :<textarea style={{...pi,resize:"vertical",minHeight:52,lineHeight:1.6}} value={g[k]||""} onChange={e=>updGoal(g.id,k,e.target.value)} spellCheck/>
                      }
                    </div>
                  ))}
                </div>
              )}
              <button className="btn btn-ghost btn-xs" style={{marginTop:6}} onClick={()=>updGoal(g.id,"expanded",!g.expanded)}>{g.expanded?"▲ Less":"▼ More"}</button>
            </div>
          );
        })}
        <button className="btn btn-primary btn-sm" onClick={()=>save({goals:data.goals})}>💾 Save Goals</button>
      </div>}

      {tab==="appointments"&&<div className="fade">
        {(data.appointments||[]).length===0
          ?<div className="empty-state"><div className="es-ico">📅</div><div>No appointments scheduled yet</div></div>
          :(data.appointments||[]).map(a=>{
            const at=APPT_TYPES.find(t=>t.v===a.type)||APPT_TYPES[APPT_TYPES.length-1];
            return(
              <div key={a.id} className="card" style={{borderLeft:`3px solid ${at.c}`,padding:"12px 14px",marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:12,color:at.c}}>{at.l}</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>{a.day}{a.date?" · "+fmtDate(a.date):""}{a.time?" · "+a.time:""}{a.location?" · 📍 "+a.location:""}</div>
                {a.questions&&<div style={{marginTop:6,fontSize:11}}><span style={{color:"var(--blue)",fontWeight:700}}>Questions: </span>{a.questions}</div>}
                {a.barriers&&<div style={{marginTop:4,fontSize:11}}><span style={{color:"#f97316",fontWeight:700}}>Barriers: </span>{a.barriers}</div>}
              </div>
            );
          })
        }
      </div>}

      {tab==="notes"&&<div className="fade">
        <div className="fg"><div className="lbl">Student Notes & Reflections</div>
          <textarea className="inp ta" value={data.notes||""} onChange={e=>setData(p=>({...p,notes:e.target.value}))} style={{minHeight:300}} spellCheck placeholder="Student notes, reflections, ideas..."/>
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>save({notes:data.notes})}>💾 Save Notes</button>
      </div>}

      {tab==="sessions"&&<div className="fade">
        <SessionNotePanel studentName={student.name} studentId={student.studentId} coachEmail={COACH_EMAIL} onSaved={()=>showToast("Session saved!")} showToast={showToast}/>
      </div>}

      {tab==="mos"&&<div className="fade">
        {student?.uid
          ?<MosPanel uid={student.uid} readOnly={false}/>
          :<div className="empty-state"><div className="es-ico">🍊</div><div>Student hasn't logged in yet — MyOrangeSuccess will appear here once they register.</div></div>
        }
      </div>}
    </div>
  );
}

═══════════════════════════════════════════════════════════ */
function ComposePanel({roster,onSent,showToast}){
  const [to,setTo]=useState("ALL");
  const [subject,setSubject]=useState("");
  const [body,setBody]=useState("");
  const [sending,setSending]=useState(false);

  const send=async()=>{
    if(!db){showToast("Firebase not connected");return;}
    if(!subject.trim()||!body.trim()){showToast("Add subject and message.");return;}
    setSending(true);
    try{
      await db.collection("messages").add({
        to,from:"coach",fromName:COACH_NAME,
        subject:subject.trim(),body:body.trim(),
        timestamp:firebase.firestore.FieldValue.serverTimestamp(),
        readBy:[],
      });
      showToast(`✅ Message sent${to==="ALL"?" to all students":""}!`);
      setSubject("");setBody("");setTo("ALL");
      if(onSent)onSent();
    }catch(e){showToast("Send failed: "+e.message);}
    finally{setSending(false);}
  };

  return(
    <div className="card">
      <div className="card-title">📨 Compose Coach Message</div>
      <div className="card-sub">Messages appear immediately with a flashing notification in the student's portal.</div>
      <div className="fg">
        <div className="lbl">Send To</div>
        <select className="inp sel" value={to} onChange={e=>setTo(e.target.value)}>
          <option value="ALL">📢 All Students — Broadcast ({roster.filter(s=>s.uid).length} active)</option>
          {roster.filter(s=>s.uid).map(s=><option key={s.uid} value={s.uid}>{s.name||s.email}</option>)}
        </select>
      </div>
      <div className="fg">
        <div className="lbl">Subject</div>
        <input className="inp" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="e.g. Check-in this week | Deadline reminder" spellCheck/>
      </div>
      <div className="fg">
        <div className="lbl">Message</div>
        <textarea className="inp ta" value={body} onChange={e=>setBody(e.target.value)} style={{minHeight:160}} placeholder="Write your coaching message here..." spellCheck/>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <button className="btn btn-primary" onClick={send} disabled={sending||!subject.trim()||!body.trim()}>
          {sending?"Sending...":"📨 Send Message"}
        </button>
        <div style={{fontSize:11,color:"var(--muted)"}}>{to==="ALL"?`Sends to ${roster.filter(s=>s.uid).length} active students`:"Individual message"}</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MANAGE STUDENTS PANEL
═══════════════════════════════════════════════════════════ */
function ManageStudentsPanel({roster,onUpdate,showToast}){
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:"",email:"",studentId:"",slotNum:""});
  const [saving,setSaving]=useState(false);

  const addSlot=()=>{
    const next=roster.length+1;
    setEditing("new");
    setForm({name:"",email:"",studentId:"",slotNum:next});
  };

  const save=async()=>{
    if(!db){showToast("Firebase not connected");return;}
    if(!form.name&&!form.email){showToast("Enter a name or email.");return;}
    if(saving)return;
    setSaving(true);
    try{
      if(editing==="new"){
        const ref=db.collection("roster").doc();
        await ref.set({id:ref.id,slotNum:parseInt(form.slotNum,10)||roster.length+1,name:form.name,email:form.email.toLowerCase(),studentId:form.studentId,uid:"",active:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      }else{
        await db.collection("roster").doc(editing).update({name:form.name,email:form.email.toLowerCase(),studentId:form.studentId,slotNum:parseInt(form.slotNum,10)||1});
      }
      showToast("✅ Student saved!");setEditing(null);
      if(onUpdate)onUpdate();
    }catch(e){showToast("Save failed: "+e.message);}
    finally{setSaving(false);}
  };

  const remove=async(id)=>{
    if(!db){showToast("Firebase not connected");return;}
    if(!window.confirm("Remove this student slot?"))return;
    try{await db.collection("roster").doc(id).delete();showToast("Student removed.");if(onUpdate)onUpdate();}
    catch(e){showToast("Error: "+e.message);}
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:16}}>Student Roster — {roster.length}/{MAX_STUDENTS} slots</div>
        <button className="btn btn-primary btn-sm" disabled={roster.length>=MAX_STUDENTS} onClick={addSlot}>+ Add Student</button>
      </div>
      {editing&&(
        <div className="card fade" style={{borderColor:O+"44",marginBottom:14}}>
          <div className="card-title">{editing==="new"?"Add Student":"Edit Student"}</div>
          <div className="g2" style={{marginBottom:10}}>
            <div className="fg"><div className="lbl">Full Name</div><input className="inp" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Student's full name" spellCheck/></div>
            <div className="fg"><div className="lbl">SU Email</div><input className="inp" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="student@syr.edu"/></div>
            <div className="fg"><div className="lbl">Student ID</div><input className="inp" value={form.studentId} onChange={e=>setForm(p=>({...p,studentId:e.target.value}))} placeholder="e.g. 987654321"/></div>
            <div className="fg"><div className="lbl">Slot #</div><input className="inp" type="number" value={form.slotNum} onChange={e=>setForm(p=>({...p,slotNum:e.target.value}))} min="1" max={MAX_STUDENTS}/></div>
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:10}}>Student visits this platform URL and creates their account with the email above. Their planner auto-links to this slot.</div>
          <div style={{display:"flex",gap:8}}><button className="btn btn-primary btn-sm" onClick={save} disabled={saving}>{saving?"Saving...":"Save"}</button><button className="btn btn-ghost btn-sm" onClick={()=>setEditing(null)}>Cancel</button></div>
        </div>
      )}
      <div className="roster-grid">
        {roster.map(s=>(
          <div key={s.id} className="student-card" onClick={()=>{setEditing(s.id);setForm({name:s.name||"",email:s.email||"",studentId:s.studentId||"",slotNum:s.slotNum||""});}}>
            <div className="sc-num">#{s.slotNum||"?"}</div>
            <div className="sc-avatar" style={{background:avatarColor(s.name||"")}}>
              {initials(s.name||s.email||"")}
            </div>
            <div className="sc-name">{s.name||<span style={{color:"var(--muted)"}}>No name</span>}</div>
            <div className="sc-meta">{s.email||"No email"}</div>
            {s.uid&&<div className="sc-tag" style={{background:"var(--green)18",border:"1px solid var(--green)33",color:"var(--green)"}}>✓ Active</div>}
            {!s.uid&&<div className="sc-tag" style={{background:"var(--yellow)18",border:"1px solid var(--yellow)33",color:"var(--yellow)"}}>Pending login</div>}
            <button className="btn btn-ghost btn-xs" style={{marginTop:6,width:"100%"}} onClick={e=>{e.stopPropagation();remove(s.id);}}>Remove</button>
          </div>
        ))}
        {Array.from({length:Math.max(0,MAX_STUDENTS-roster.length)},(_,i)=>(
          <div key={`empty-${i}`} className="student-card sc-empty" onClick={addSlot}>
            <div className="sc-num">#{roster.length+i+1}</div>
            <div className="sc-avatar" style={{background:"var(--bdr)",color:"var(--dim)"}}>+</div>
            <div className="sc-name" style={{color:"var(--dim)"}}>Open Slot</div>
            <div className="sc-meta" style={{color:"var(--dim)"}}>Click to add</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   COACH DASHBOARD
═══════════════════════════════════════════════════════════ */
function CoachDashboard({user,showToast}){
  const [view,setView]=useState("roster");
  const [roster,setRoster]=useState([]);
  const [messages,setMessages]=useState([]);
  const [selectedStudent,setSelectedStudent]=useState(null);
  const [sessionNotes,setSessionNotes]=useState([]);
  const [studentPortalData,setStudentPortalData]=useState({}); // {uid: {lastPortalVisit, ...}}
  // Session Notes filter state
  const [noteDateFrom,setNoteDateFrom]=useState("");
  const [noteDateTo,setNoteDateTo]=useState("");
  const [noteStudentFilter,setNoteStudentFilter]=useState("ALL");
  const [expandedNoteId,setExpandedNoteId]=useState(null);

  const _fallbackUnsubRef=useRef(null); // stores fallback sessionNotes unsub to prevent leak
  useEffect(()=>{
    if(!db)return; // Firebase not initialized — defensive guard
    const unsub1=db.collection("roster").orderBy("slotNum")
      .onSnapshot(
        s=>{setRoster(s.docs.map(d=>({id:d.id,...d.data()})));},
        err=>{
          console.error("Roster listener error:",err);
          showToast("⚠️ Roster failed to load — check Firestore rules & network");
          setRoster([]); // ensure loading state resolves
        }
      );
    const unsub2=db.collection("messages").orderBy("timestamp","desc").limit(50)
      .onSnapshot(
        s=>{setMessages(s.docs.map(d=>({id:d.id,...d.data()})));},
        err=>{console.error("Messages listener error:",err);}
      );
    // Session notes: load last 365 days (coach-only per Firestore rules — FERPA protected)
    const _yearAgo=new Date();_yearAgo.setFullYear(_yearAgo.getFullYear()-1);
    const _yearAgoTs=firebase.firestore.Timestamp.fromDate(_yearAgo);
    const unsub3=db.collection("sessionNotes")
      .where("createdAt",">=",_yearAgoTs)
      .orderBy("createdAt","desc")
      .limit(500) // 20 students × 25 sessions = 500 max per year
      .onSnapshot(
        s=>{setSessionNotes(s.docs.map(d=>({id:d.id,...d.data()})));},
        err=>{
          console.error("Session notes listener error:",err);
          // Fallback: if composite index not yet created, load without date filter
          // Store unsubscribe so it is cleaned up when component unmounts
          _fallbackUnsubRef.current=db.collection("sessionNotes").orderBy("createdAt","desc").limit(500)
            .onSnapshot(s2=>{setSessionNotes(s2.docs.map(d=>({id:d.id,...d.data()})));},()=>{});
        }
      );
    // Subscribe to student docs so coach can see lastPortalVisit for each student
    const unsub4=db.collection("students")
      .onSnapshot(
        s=>{const map={};s.docs.forEach(d=>{map[d.id]={...d.data()};});setStudentPortalData(map);},
        err=>{console.error("Student portal data listener error:",err);}
      );
    return()=>{unsub1();unsub2();unsub3();unsub4();if(_fallbackUnsubRef.current)_fallbackUnsubRef.current();};
  },[]);

  const openStudent=(s)=>{setSelectedStudent(s);setView("student");};

  // Keep selectedStudent fully fresh whenever roster snapshot updates
  useEffect(()=>{
    if(!selectedStudent?.id||!roster.length)return;
    const fresh=roster.find(s=>s.id===selectedStudent.id);
    if(fresh)setSelectedStudent(fresh);
  },[roster,selectedStudent?.id]);

  return(
    <>
    <div className="app-shell">
      <div className="top-bar">
        <div className="top-brand">
          <div className="top-badge">OnTrack at SU</div>
          <div className="top-title">Coach Dashboard</div>
        </div>
        <div className="top-right">
          <div className="top-contact">
            <a href={`tel:${COACH_PHONE}`}>📱 {COACH_PHONE}</a>
            <a href={`mailto:${COACH_EMAIL}`}>✉️ {COACH_EMAIL}</a>
          </div>
          <div style={{fontSize:11,color:"var(--muted)",borderLeft:"1px solid var(--bdr)",paddingLeft:12}}>{COACH_NAME}, {COACH_TITLE}</div>
          <button className="btn btn-ghost btn-sm" onClick={()=>auth.signOut()}>Sign Out</button>
        </div>
      </div>
      <div className="coach-shell">
        {/* SIDEBAR */}
        <div className="sidebar">
          <div className="sb-section">Navigation</div>
          {[
            {id:"roster",ico:"👥",l:"Student Roster"},
            {id:"compose",ico:"📨",l:"Send Message",badge:null},
            {id:"notes_list",ico:"📋",l:"Session Notes"},
            {id:"manage",ico:"⚙️",l:"Manage Students"},
          ].map(item=>(
            <button key={item.id} className={`sb-btn${view===item.id?" active":""}`} onClick={()=>{setView(item.id);setSelectedStudent(null);}}>
              <span className="ico">{item.ico}</span>{item.l}
              {item.badge&&<span className="sb-badge">{item.badge}</span>}
            </button>
          ))}

          <div className="sb-section">Students</div>
          <div style={{overflow:"hidden",flex:1,overflowY:"auto"}}>
            {roster.map(s=>(
              <button key={s.id} className={`sb-btn${selectedStudent?.id===s.id?" active":""}`} onClick={()=>openStudent(s)}>
                <div style={{width:22,height:22,borderRadius:"50%",background:avatarColor(s.name||""),display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>
                  {initials(s.name||"")}
                </div>
                <div style={{flex:1,minWidth:0,textAlign:"left"}}>
                  <div style={{fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name||"No name"}</div>
                  <div style={{fontSize:9,color:"var(--dim)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.studentId||s.email||"—"}</div>
                </div>
                {s.uid&&<span style={{width:6,height:6,borderRadius:"50%",background:"var(--green)",flexShrink:0}}/>}
              </button>
            ))}
          </div>
        </div>

        {/* MAIN */}
        <div className="main-area">
          {view==="roster"&&!selectedStudent&&(
            <div className="fade">
              <div style={{marginBottom:16}}>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20,marginBottom:4}}>Student Roster</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>{roster.filter(s=>s.uid).length} active · {roster.filter(s=>!s.uid).length} pending · {MAX_STUDENTS-roster.length} open slots</div>
              </div>
              <div className="roster-grid">
                {roster.map(s=>{
                  const portalVisit=s.uid?studentPortalData[s.uid]?.lastPortalVisit:null;
                  return(
                  <div key={s.id} className={`student-card${selectedStudent?.id===s.id?" active":""}`} onClick={()=>openStudent(s)}>
                    <div className="sc-num">#{s.slotNum||"?"}</div>
                    <div className="sc-avatar" style={{background:avatarColor(s.name||"")}}>{initials(s.name||s.email||"")}</div>
                    <div className="sc-name">{s.name||<span style={{color:"var(--muted)"}}>No name</span>}</div>
                    <div className="sc-meta">{s.studentId?"ID: "+s.studentId:s.email||"No email"}</div>
                    <div>
                      {s.uid
                        ?<span className="sc-tag" style={{background:"var(--green)18",border:"1px solid var(--green)33",color:"var(--green)"}}>✓ Active</span>
                        :<span className="sc-tag" style={{background:"var(--yellow)18",border:"1px solid var(--yellow)33",color:"var(--yellow)"}}>Pending</span>}
                    </div>
                    <div style={{marginTop:6,fontSize:9,color:portalVisit?"var(--muted)":"var(--dim)",display:"flex",alignItems:"center",gap:3}}>
                      <span>🕐</span>
                      <span>{portalVisit?`Last active: ${ts2str(portalVisit)}`:s.uid?"Never logged in":"Awaiting registration"}</span>

                  </div>
                  );

                {Array.from({length:Math.max(0,MAX_STUDENTS-roster.length)},(_,i)=>(
                  <div key={`e${i}`} className="student-card sc-empty" onClick={()=>setView("manage")}>

                    <div className="sc-name" style={{color:"var(--dim)"}}>Open Slot</div>
                    <div className="sc-meta" style={{color:"var(--dim)"}}>Click to add</div>
                  </div>

            </div>
          )}

          {view==="student"&&selectedStudent&&(
            <StudentFileViewer student={selectedStudent} onClose={()=>{setView("roster");setSelectedStudent(null);}} showToast={showToast}/>
          )}

          {view==="compose"&&(
            <div className="fade">
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20,marginBottom:16}}>Messages</div>
              <ComposePanel roster={roster} onSent={()=>{}} showToast={showToast}/>
              <div className="card" style={{marginTop:14}}>
                <div className="card-title">📬 Recent Messages</div>
                {messages.length===0&&<div className="empty-state"><div className="es-ico">📬</div><div>No messages yet</div></div>}
                {messages.slice(0,15).map(m=>(
                  <div key={m.id} className="msg-card">
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                      <div style={{fontSize:12,fontWeight:700}}>{m.subject}</div>
                      <div style={{fontSize:10,color:"var(--muted)",flexShrink:0,marginLeft:8}}>{ts2str(m.timestamp)}</div>
                    </div>
                    <div style={{fontSize:10,color:"var(--muted)",marginBottom:4}}>To: {m.to==="ALL"?"All Students":roster.find(s=>s.uid===m.to)?.name||m.to}</div>
                    <div style={{fontSize:11,color:"var(--txt)",lineHeight:1.6,maxHeight:60,overflow:"hidden"}}>{m.body}</div>
                    <div style={{fontSize:10,color:"var(--dim)",marginTop:4}}>Read by {(m.readBy||[]).length} student{(m.readBy||[]).length!==1?"s":""}</div>

                ))}
              </div>
            </div>
          )}

          {view==="notes_list"&&(
            <div className="fade">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20}}>Session Notes</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>{sessionNotes.length} note{sessionNotes.length!==1?"s":""} in past 365 days · coach-only 🔒 FERPA</div>
              </div>

              {/* ── New Note shortcut ── */}
              <div className="card" style={{marginBottom:14,borderColor:O+"33",background:O+"08"}}>
                <div className="card-title">📋 New Session Note</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>

                    <button key={s.id} className="btn btn-ghost btn-sm" onClick={()=>openStudent(s)}>
                      {initials(s.name||"")} {s.name||s.email}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:11,color:"var(--muted)"}}>Select a student → open their file → Session Notes tab</div>

              {/* ── Filters ── */}
              <div className="card" style={{marginBottom:14}}>
                <div className="card-title">🔍 Search & Filter Notes</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",gap:10,alignItems:"end"}}>
                  <div>
                    <div className="lbl">Student</div>
                    <select className="inp sel" value={noteStudentFilter} onChange={e=>{setNoteStudentFilter(e.target.value);setExpandedNoteId(null);}}>
                      <option value="ALL">All Students</option>
                      {[...new Set(sessionNotes.map(n=>n.studentName).filter(Boolean))].sort().map(name=>(

                  </div>
                  <div>
                    <div className="lbl">From Date</div>
                    <input type="date" className="inp" value={noteDateFrom} onChange={e=>{setNoteDateFrom(e.target.value);setExpandedNoteId(null);}}/>

                  <div>
                    <div className="lbl">To Date</div>
                    <input type="date" className="inp" value={noteDateTo} onChange={e=>{setNoteDateTo(e.target.value);setExpandedNoteId(null);}}/>

              {/* ── Notes list ── */}
              {(()=>{
                const filtered=sessionNotes.filter(n=>{
                  if(noteStudentFilter!=="ALL"&&n.studentName!==noteStudentFilter)return false;
                  if(noteDateFrom&&n.sessionDate<noteDateFrom)return false;
                  if(noteDateTo&&n.sessionDate>noteDateTo)return false;
                  return true;
                });
                if(!filtered.length)return(
                  <div className="empty-state"><div className="es-ico">📋</div>
                    <div>{sessionNotes.length?"No notes match your filters — try adjusting the date range or student filter":"No session notes yet"}</div>

                  const isExpanded=expandedNoteId===n.id;
                  const studentName=n.studentName||"Unknown Student";
                  const sessionDate=fmtDate(n.sessionDate);
                  const sessionNum=n.sessionNum>0?` · Session #${n.sessionNum}`:"";
                  const dur=n.sessionData?.dur;
                  const mode=n.sessionData?.mode||"In-Person";
                  const rawNotes=n.sessionData?.rawNotes||n.sessionData?.notes||"";

                    <div key={n.id} className="card fade" style={{padding:"14px 16px",marginBottom:8,borderColor:isExpanded?O+"55":"var(--bdr)",background:isExpanded?"linear-gradient(135deg,#001328,var(--s1))":"var(--s1)",transition:"all .2s"}}>

                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",cursor:"pointer"}} onClick={()=>setExpandedNoteId(isExpanded?null:n.id)}>
