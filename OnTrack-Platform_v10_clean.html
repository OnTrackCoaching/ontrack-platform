                          <div style={{fontSize:11,color:"var(--muted)"}}>{sessionDate}{dur?` · ${dur} min`:""} · {mode}</div>
                          {!isExpanded&&n.sessionData?.sessionGoals&&(
                            <div style={{fontSize:11,color:"var(--txt)",marginTop:5,lineHeight:1.5,maxHeight:36,overflow:"hidden",opacity:.75}}>
                              <strong style={{color:O}}>Goals:</strong> {n.sessionData.sessionGoals}
                            </div>
                          )}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,marginLeft:12}}>
                          <div style={{fontSize:10,color:"var(--muted)"}}>{ts2str(n.createdAt)}</div>
                          <div style={{fontSize:12,color:isExpanded?O:"var(--muted)",fontWeight:700}}>{isExpanded?"▲ Close":"▼ Read"}</div>
                        </div>
                      </div>

                      {/* Expanded: full note content */}
                      {isExpanded&&(
                        <div style={{marginTop:14,borderTop:`1px solid ${O}33`,paddingTop:14}}>
                          {/* Note header banner */}
                          <div style={{background:O+"18",border:`1px solid ${O}33`,borderRadius:8,padding:"10px 14px",marginBottom:14}}>
                            <div style={{fontSize:9,color:O,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>OnTrack at SU — Confidential Session Note · FERPA Protected</div>
                            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:16}}>{studentName}</div>
                            <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{sessionDate}{sessionNum} · {dur?dur+" min · ":""}{mode} · Coach: {COACH_NAME}</div>
                          </div>
                    {n.sessionData?.sessionGoals&&<div key="sessionGoals" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>🎯 Session Goals</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.sessionGoals}</div></div>}
                    {n.sessionData?.preSessionCheckin&&<div key="preSessionCheckin" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>💭 Pre-Session Check-In</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.preSessionCheckin}</div></div>}
                    {n.sessionData?.keyDiscussionPoints&&<div key="keyDiscussionPoints" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>🗣️ Key Discussion Points</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.keyDiscussionPoints}</div></div>}
                    {n.sessionData?.strategiesIdentified&&<div key="strategiesIdentified" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>🔧 Strategies Identified</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.strategiesIdentified}</div></div>}
                    {n.sessionData?.studentInsights&&<div key="studentInsights" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>💡 Student Insights</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.studentInsights}</div></div>}
                    {n.sessionData?.barriersAddressed&&<div key="barriersAddressed" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>🚧 Barriers Addressed</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.barriersAddressed}</div></div>}
                    {n.sessionData?.efFocusAreas&&<div key="efFocusAreas" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>🧠 EF Focus Areas</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.efFocusAreas}</div></div>}
                    {n.sessionData?.actionSteps&&<div key="actionSteps" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>✅ Action Steps</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.actionSteps}</div></div>}
                    {n.sessionData?.coachObservations&&<div key="coachObservations" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>🔒 Coach Observations</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.coachObservations}</div></div>}
                    {n.sessionData?.sessionOutcomes&&<div key="sessionOutcomes" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>📈 Session Outcomes</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.sessionOutcomes}</div></div>}
                    {n.sessionData?.nextSessionFocus&&<div key="nextSessionFocus" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>🔭 Next Session Focus</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.nextSessionFocus}</div></div>}
                    {n.sessionData?.referrals&&<div key="referrals" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>🏥 Referrals</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.referrals}</div></div>}
                    {n.sessionData?.coachingCompetencies&&<div key="coachingCompetencies" style={{marginBottom:10}}><div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>🎓 ICF Competencies</div><div style={{fontSize:12,color:"var(--txt)",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{n.sessionData.coachingCompetencies}</div></div>}
                          {/* Raw transcript if preserved */}
                          {rawNotes&&<div style={{marginTop:14,padding:"10px 14px",background:"var(--s2)",borderRadius:8,border:"1px solid var(--bdr)"}}>
                            <div style={{fontSize:10,color:"var(--dim)",fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:6}}>📝 Original Notes / Transcript</div>
                            <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{rawNotes}</div>
                          </div>}
                          {/* Action buttons */}
                          <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
                            <button className="btn btn-ghost btn-sm" onClick={()=>{
                              const LABELS={sessionGoals:"🎯 SESSION GOALS",preSessionCheckin:"💭 PRE-SESSION CHECK-IN",keyDiscussionPoints:"🗣️ KEY DISCUSSION POINTS",strategiesIdentified:"🔧 STRATEGIES IDENTIFIED",studentInsights:"💡 STUDENT INSIGHTS",barriersAddressed:"🚧 BARRIERS ADDRESSED",efFocusAreas:"🧠 EXECUTIVE FUNCTION AREAS",actionSteps:"✅ ACTION STEPS",coachObservations:"🔒 COACH OBSERVATIONS",sessionOutcomes:"📈 OUTCOMES",nextSessionFocus:"🔭 NEXT SESSION FOCUS",referrals:"🏥 REFERRALS",coachingCompetencies:"🎓 ICF COMPETENCIES"};
                              const txt="ONTRACK AT SU — SESSION NOTE\nStudent: "+studentName+"\nDate: "+sessionDate+sessionNum+"\n\n"+Object.entries(LABELS).map(([k,l])=>n.sessionData?.[k]?l+"\n"+n.sessionData[k]+"\n":"").filter(Boolean).join("\n");
                              navigator.clipboard?.writeText(txt).then(()=>showToast("📋 Note copied!")).catch(()=>showToast("Copy unavailable"));
                            }}>📋 Copy Note</button>
                            <button className="btn btn-blue btn-sm" onClick={()=>{
                              const LABELS={sessionGoals:"🎯 SESSION GOALS",preSessionCheckin:"💭 PRE-SESSION CHECK-IN",keyDiscussionPoints:"🗣️ KEY DISCUSSION POINTS",strategiesIdentified:"🔧 STRATEGIES IDENTIFIED",studentInsights:"💡 STUDENT INSIGHTS",barriersAddressed:"🚧 BARRIERS ADDRESSED",efFocusAreas:"🧠 EXECUTIVE FUNCTION AREAS",actionSteps:"✅ ACTION STEPS",coachObservations:"🔒 COACH OBSERVATIONS (Confidential)",sessionOutcomes:"📈 OUTCOMES",nextSessionFocus:"🔭 NEXT SESSION FOCUS",referrals:"🏥 REFERRALS",coachingCompetencies:"🎓 ICF COMPETENCIES"};
                              const body="ONTRACK AT SU — COACHING SESSION NOTE\n"+"=".repeat(50)+"\nCoach: "+COACH_NAME+", "+COACH_TITLE+"\nStudent: "+studentName+"\nDate: "+sessionDate+sessionNum+" · "+(dur?dur+" min · ":"")+mode+"\n"+"─".repeat(50)+"\n"+Object.entries(LABELS).map(([k,l])=>n.sessionData?.[k]?"\n"+l+"\n"+n.sessionData[k]+"\n":"").filter(Boolean).join("");
                              const sub=encodeURIComponent(`OnTrack Session Note — ${studentName} — ${n.sessionDate||""}`);
                              window.open(`mailto:${COACH_EMAIL}?subject=${sub}&body=${encodeURIComponent(body)}`);
                            }}>✉️ Send to Outlook</button>
                            <button className="btn btn-ghost btn-sm" style={{marginLeft:"auto"}} onClick={()=>setExpandedNoteId(null)}>▲ Close</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                });
              })()}
            </div>
          )}

          {view==="manage"&&(
            <div className="fade">
              <ManageStudentsPanel roster={roster} onUpdate={()=>{}} showToast={showToast}/>
            </div>
          )}
        </div>
      </div>
    </div>
    <CopyrightFooter/>
    </>
  );
}

/* ═══════════════════════════════════════════════════════════
   STUDENT PORTAL
═══════════════════════════════════════════════════════════ */
function StudentPortal({user,rosterEntry,showToast}){
  const [data,setData]=useState(null);
  const [messages,setMessages]=useState([]);
  const [unread,setUnread]=useState(0);
  const [tab,setTab]=useState("planner");
  const [saving,setSaving]=useState(false);
  const hasWrittenVisit=useRef(false); // write lastPortalVisit once per session

  useEffect(()=>{
    if(!db||!user?.uid)return; // Firebase or user not ready
    // link uid to roster entry
    if(rosterEntry&&!rosterEntry.uid){
      db.collection("roster").doc(rosterEntry.id).update({uid:user.uid}).catch(e=>console.warn("Roster uid update failed:",e.message));
    }
    // Record this portal visit (one write per session, visible to coach)
    if(!hasWrittenVisit.current){
      hasWrittenVisit.current=true;
      db.collection("students").doc(user.uid)
        .set({lastPortalVisit:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})
        .catch(e=>console.warn("lastPortalVisit write failed:",e.message));
    }
    // student data
    const unsub1=db.collection("students").doc(user.uid)
      .onSnapshot(
        snap=>{
          if(snap.exists){
            // Deep-merge with INIT_STUDENT so any missing field gets a safe default.
            // A plain snap.data() would crash the app if e.g. profile was never written.
            const raw=snap.data();
            setData({
              ...INIT_STUDENT,
              ...raw,
              profile:{...INIT_STUDENT.profile,...(raw.profile||{})},
              goals:Array.isArray(raw.goals)?raw.goals:INIT_STUDENT.goals,
              appointments:Array.isArray(raw.appointments)?raw.appointments:INIT_STUDENT.appointments,
              sharedWith:Array.isArray(raw.sharedWith)?raw.sharedWith:INIT_STUDENT.sharedWith,
            });
          }else{
            const init={...INIT_STUDENT,profile:{...INIT_STUDENT.profile,name:rosterEntry?.name||"",studentId:rosterEntry?.studentId||""}};
            db.collection("students").doc(user.uid).set(init);
            setData(init);
          }
        },
        err=>{
          console.error("Student data read error:",err);
          setData({...INIT_STUDENT,profile:{...INIT_STUDENT.profile,name:rosterEntry?.name||"",studentId:rosterEntry?.studentId||""}});
        }
      );
    // messages — requires composite index in Firebase Console:
    //   Collection: messages | Fields: to (Asc), timestamp (Desc)
    // Isolated in its own try/catch so a missing index never blocks student data above
    let unsub2=()=>{};
    try{
      unsub2=db.collection("messages")
        .where("to","in",[user.uid,"ALL"])
        .orderBy("timestamp","desc")
        .limit(30)
        .onSnapshot(
          snap=>{
            const msgs=snap.docs.map(d=>({id:d.id,...d.data()}));
            setMessages(msgs);
            setUnread(msgs.filter(m=>!(m.readBy||[]).includes(user.uid)).length);
          },
          err=>{
            console.error("Messages query error (check composite index):",err);
            // Messages fail gracefully — student planner still loads
          }
        );
    }catch(e){console.error("Messages listener setup failed:",e);}
    return()=>{unsub1();unsub2();};
  },[user?.uid]);

  const save=async(patch)=>{
    if(!db||!user?.uid)return;
    const payload=patch||data;
    if(!payload){showToast("⚠️ No data to save yet");return;}
    setSaving(true);
    try{await db.collection("students").doc(user.uid).set(payload,{merge:true});showToast("✅ Saved!");}
    catch(e){showToast("Save failed: "+e.message);}
    finally{setSaving(false);}
  };

  const markRead=async(msgId)=>{
    if(!db)return;
    try{
      await db.collection("messages").doc(msgId).update({readBy:firebase.firestore.FieldValue.arrayUnion(user.uid)});
    }catch(e){
      // Likely a Firestore rules issue — student needs update permission on messages.readBy
      // See security rules note in SetupScreen. Fail silently in UI so it doesn't disrupt reading.
      console.warn("markRead failed (check Firestore rules allow students to update readBy):",e.message);
    }
  };

  const updProfile=(k,v)=>setData(p=>({...p,profile:{...p.profile,[k]:v}}));
  const updGoal=(id,k,v)=>setData(p=>({...p,goals:(p.goals||[]).map(g=>g.id===id?{...g,[k]:v}:g)}));
  const delAppt=(id)=>{
    const remaining=(data.appointments||[]).filter(a=>a.id!==id);
    setData(p=>({...p,appointments:remaining}));
    save({appointments:remaining});
  };
  const updAppt=(id,k,v)=>setData(p=>({...p,appointments:(p.appointments||[]).map(a=>a.id===id?{...a,[k]:v}:a)}));

  const pi={background:"var(--s2)",border:"1px solid var(--bdr)",color:"var(--txt)",borderRadius:7,padding:"8px 11px",fontSize:12,width:"100%"};
  const STATUS_MAP={not_started:{l:"Not Started",c:"#6b82a8"},urgent:{l:"🚨 Urgent",c:"#ef4444"},started:{l:"🔄 Started",c:"#fbbf24"},completed:{l:"✅ Completed",c:"#34d399"}};

  if(!data)return<div style={{padding:40,color:"var(--muted)",textAlign:"center"}}>Loading your planner...</div>;

  return(
    <div className="app-shell">
      <div className="top-bar">
        <div className="top-brand">
          <div className="top-badge">OnTrack at SU</div>
          <div className="top-title">My Orange Success</div>
        </div>
        <div className="top-right">
          <div style={{fontSize:11,color:"var(--muted)"}}>Coach: {COACH_NAME} · 📱 {COACH_PHONE}</div>
          {unread>0&&(
            <button className="btn flash-btn btn-sm" style={{background:O,color:"#fff",border:"none"}} onClick={()=>setTab("mail")}>
              📬 {unread} Coach Mail
            </button>
          )}
          <button className="btn btn-ghost btn-sm" onClick={()=>auth.signOut()}>Sign Out</button>
        </div>
      </div>

      <div style={{padding:"16px 20px",maxWidth:1100,margin:"0 auto",width:"100%"}}>
        {/* COACH MAIL BANNER */}
        {unread>0&&tab!=="mail"&&(
          <div className="coach-mail-banner" onClick={()=>setTab("mail")}>
            <div className="mail-dot"/>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:O}}>📬 You have {unread} new message{unread!==1?"s":""} from Coach Bisson</div>
              <div style={{fontSize:11,color:"var(--muted)"}}>Click to read your Coach Mail</div>
            </div>
            <button className="btn btn-primary btn-sm" style={{marginLeft:"auto"}}>Read Now →</button>
          </div>
        )}

        <div className="stab-bar">
          {[
            {id:"planner",l:"🎯 Goals & Planner"},
            {id:"profile",l:"👤 My Profile"},
            {id:"appointments",l:"📆 Appointments"},
            {id:"notes",l:"📝 Notes"},
            {id:"mail",l:`📬 Coach Mail${unread>0?" ("+unread+")":""}`},
            {id:"mos",l:"🍊 MyOrangeSuccess"},
            {id:"share",l:"🔗 Share Access"},
          ].map(t=>(
            <button key={t.id} className={`stab${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>
          ))}
        </div>

        {/* PLANNER TAB */}
        {tab==="planner"&&<div className="fade">
          <div className="card" style={{marginBottom:14}}>
            <div className="card-title">🎯 Weekly Goals</div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:12}}>
              Week of {(()=>{const d=new Date();const day=d.getDay();const diff=day===0?-6:1-day;const mon=new Date(d);mon.setDate(d.getDate()+diff);return mon.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})+'  –  '+new Date(mon.getTime()+6*864e5).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});})()}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:10}}>
              {(data.goals||[]).map((g,i)=>{
                const st=STATUS_MAP[g.status]||STATUS_MAP.not_started;
                return(
                  <div key={g.id} className="card fade" style={{borderLeft:`3px solid ${st.c}`,padding:"12px 14px",marginBottom:0}}>
                    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:st.c,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <input style={{...pi,background:"transparent",border:"none",borderBottom:"1px solid var(--bdr)",borderRadius:0,fontSize:12,fontWeight:700,flex:1,padding:"2px 0"}} value={g.title||""} onChange={e=>updGoal(g.id,"title",e.target.value)} placeholder={`Goal ${i+1}...`} spellCheck/>
                    </div>
                    <div style={{display:"flex",gap:6,marginBottom:6}}>
                      <select style={{...pi,width:"auto",flex:1,fontSize:10,color:st.c,border:`1px solid ${st.c}55`,padding:"4px 7px"}} value={g.status} onChange={e=>updGoal(g.id,"status",e.target.value)}>
                        {Object.entries(STATUS_MAP).map(([v,x])=><option key={v} value={v}>{x.l}</option>)}
                      </select>
                      <input type="date" style={{...pi,width:"auto",fontSize:10,padding:"4px 7px"}} value={g.completionDate||""} onChange={e=>updGoal(g.id,"completionDate",e.target.value)}/>
                    </div>
                    {g.expanded&&(
                      <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
                        {[["steps","📋 Steps"],["location","📍 Location"],["supportsRequired","🤝 Supports"],["outcomeExpectations","🎓 Outcomes"],["reflection","✏️ My Reflection"]].map(([k,l])=>(
                          <div key={k}>
                            <div className="lbl">{l}</div>
                            {k==="location"
                              ?<input style={pi} value={g[k]||""} onChange={e=>updGoal(g.id,k,e.target.value)} spellCheck/>
                              :<textarea style={{...pi,resize:"vertical",minHeight:50,lineHeight:1.5}} value={g[k]||""} onChange={e=>updGoal(g.id,k,e.target.value)} spellCheck/>
                            }
                          </div>
                        ))}
                      </div>
                    )}
                    <button className="btn btn-ghost btn-xs" style={{marginTop:6}} onClick={()=>updGoal(g.id,"expanded",!g.expanded)}>{g.expanded?"▲":"▼ Details"}</button>
                  </div>
                );
              })}
            </div>
            <button className="btn btn-primary btn-sm" style={{marginTop:12}} onClick={()=>save({goals:data.goals})}>💾 Save Goals</button>
          </div>
        </div>}

        {/* PROFILE TAB */}
        {tab==="profile"&&<div className="fade">
          <div className="card">
            <div className="card-title">👤 My Profile</div>
            <div className="g2" style={{marginBottom:10}}>
              {[["name","Full Name"],["studentId","Student ID"],["cell","Cell Phone"],["dorm","Dorm / Residence"],["major","Major"],["year","Academic Year"]].map(([k,l])=>(
                <div key={k} className="fg"><div className="lbl">{l}</div><input style={pi} value={data.profile[k]||""} onChange={e=>updProfile(k,e.target.value)} spellCheck={k==="name"||k==="major"}/></div>
              ))}
            </div>
            <div className="divider"/>
            <div style={{fontWeight:700,fontSize:12,color:"var(--blue)",marginBottom:10}}>Parent / Guardian Contact</div>
            <div className="g2">
              {[1,2].map(n=>(
                <div key={n} style={{background:"var(--s2)",borderRadius:8,padding:"10px 12px",border:"1px solid var(--bdr)"}}>
                  <div style={{fontSize:10,color:"var(--blue)",fontWeight:700,marginBottom:8}}>Parent / Guardian {n}</div>
                  {[["Name","Name"],["Cell","Cell"],["Email","Email"]].map(([sf,l])=>(
                    <div key={sf} className="fg"><div className="lbl">{l}</div><input style={{...pi,padding:"6px 10px",fontSize:11}} value={data.profile[`parent${n}${sf}`]||""} onChange={e=>updProfile(`parent${n}${sf}`,e.target.value)}/></div>
                  ))}
                </div>
              ))}
            </div>
            <button className="btn btn-primary btn-sm" style={{marginTop:12}} onClick={()=>save({profile:data.profile})}>💾 Save Profile</button>
          </div>
        </div>}

        {/* APPOINTMENTS TAB */}
        {tab==="appointments"&&<div className="fade">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:16}}>Appointments & Support Meetings</div>
            <button className="btn btn-primary btn-sm" onClick={()=>{
              const newAppt={id:Date.now()+"",type:"prof_oh",day:"Monday",date:"",time:"",location:"",questions:"",barriers:"",expanded:true};
              const newAppts=[...(data.appointments||[]),newAppt];
              setData(p=>({...p,appointments:newAppts}));
              save({appointments:newAppts});
            }}>+ Add Appointment</button>
          </div>
          {(data.appointments||[]).length===0&&<div className="empty-state"><div className="es-ico">📅</div><div>No appointments scheduled</div></div>}
          {(data.appointments||[]).map(a=>{
            const at=APPT_TYPES.find(t=>t.v===a.type)||APPT_TYPES[APPT_TYPES.length-1];
            return(
              <div key={a.id} className="card" style={{borderLeft:`3px solid ${at.c}`,padding:"14px 16px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:at.c,flexShrink:0}}/>
                  <select style={{...pi,width:"auto",flex:1,color:at.c,border:`1px solid ${at.c}44`,fontSize:11,padding:"5px 8px"}} value={a.type} onChange={e=>updAppt(a.id,"type",e.target.value)}>
                    {APPT_TYPES.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
                  </select>
                  <button className="btn btn-ghost btn-xs" onClick={()=>updAppt(a.id,"expanded",!a.expanded)}>{a.expanded?"▲":"▼"}</button>
                  <button className="btn btn-xs" style={{background:"var(--red)18",border:"1px solid var(--red)33",color:"var(--red)"}} onClick={()=>delAppt(a.id)}>✕</button>
                </div>
                {a.expanded&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    <div className="fg"><div className="lbl">Day</div><select style={pi} value={a.day} onChange={e=>updAppt(a.id,"day",e.target.value)} className="sel">{DAYS.map(d=><option key={d}>{d}</option>)}</select></div>
                    <div className="fg"><div className="lbl">Date</div><input type="date" style={pi} value={a.date} onChange={e=>updAppt(a.id,"date",e.target.value)}/></div>
                    <div className="fg"><div className="lbl">Time</div><input type="time" style={pi} value={a.time} onChange={e=>updAppt(a.id,"time",e.target.value)}/></div>
                    <div className="fg"><div className="lbl">Location</div><input style={pi} value={a.location} onChange={e=>updAppt(a.id,"location",e.target.value)} placeholder="Building, room, Zoom..." spellCheck/></div>
                    <div className="fg"><div className="lbl">❓ Questions to Ask</div><textarea style={{...pi,resize:"vertical",minHeight:60,lineHeight:1.6}} value={a.questions} onChange={e=>updAppt(a.id,"questions",e.target.value)} spellCheck placeholder="What do you want to discuss?"/></div>
                    <div className="fg"><div className="lbl">🚧 Barriers / Concerns</div><textarea style={{...pi,resize:"vertical",minHeight:60,lineHeight:1.6}} value={a.barriers} onChange={e=>updAppt(a.id,"barriers",e.target.value)} spellCheck placeholder="What might get in the way?"/></div>
                  </div>
                )}
              </div>
            );
          })}
          <button className="btn btn-primary btn-sm" onClick={()=>save({appointments:data.appointments})}>💾 Save Appointments</button>
        </div>}

        {/* NOTES TAB */}
        {tab==="notes"&&<div className="fade">
          <div className="card">
            <div className="card-title">📝 My Notes & Reflections</div>
            <textarea className="inp ta" value={data.notes||""} onChange={e=>setData(p=>({...p,notes:e.target.value}))} style={{minHeight:300,lineHeight:1.75}} spellCheck placeholder="What's on your mind? Goals, questions for your coach, ideas, reflections..."/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
              <span style={{fontSize:11,color:"var(--muted)"}}>{(data.notes||"").length} characters</span>
              <button className="btn btn-primary btn-sm" onClick={()=>save({notes:data.notes})}>💾 Save Notes</button>
            </div>
          </div>
        </div>}

        {/* COACH MAIL TAB */}
        {tab==="mail"&&<div className="fade">
          <div className="card" style={{marginBottom:14,borderColor:O+"44",background:O+"08"}}>
            <div className="card-title">📬 Coach Mail from {COACH_NAME}</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>Messages from your OnTrack coach. Reach back: 📱 {COACH_PHONE} · ✉️ {COACH_EMAIL}</div>
          </div>
          {messages.length===0&&<div className="empty-state"><div className="es-ico">📬</div><div>No messages yet from your coach</div></div>}
          {messages.map(m=>{
            const isUnread=!(m.readBy||[]).includes(user.uid);
            return(
              <div key={m.id} className={`msg-card${isUnread?" unread":""}`} onClick={()=>isUnread&&markRead(m.id)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:13,color:isUnread?O:"var(--txt)"}}>{isUnread&&<span style={{color:O,marginRight:6}}>●</span>}{m.subject}</div>
                  <div style={{fontSize:10,color:"var(--muted)",flexShrink:0,marginLeft:8}}>{ts2str(m.timestamp)}</div>
                </div>
                <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>From: {m.fromName||"Coach Bisson"}</div>
                <div style={{fontSize:13,lineHeight:1.75,color:"var(--txt)",whiteSpace:"pre-wrap"}}>{m.body}</div>
                {isUnread&&<div style={{fontSize:10,color:"var(--dim)",marginTop:8}}>Click to mark as read</div>}
              </div>
            );
          })}
        </div>}

        {/* MY ORANGE SUCCESS TAB */}
        {tab==="mos"&&<div className="fade">
          <MosPanel uid={user.uid} readOnly={false}/>
        </div>}

        {/* SHARE TAB */}
        {tab==="share"&&<div className="fade">
          <div className="card">
            <div className="card-title">🔗 Share Your Planner — View Only</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{background:"var(--blue)22",border:"1px solid var(--blue)44",color:"var(--blue)",borderRadius:6,padding:"3px 10px",fontSize:10,fontWeight:700,letterSpacing:.5}}>👁 VIEW ONLY · NO EDIT PERMISSIONS</span>
              <span style={{background:"var(--bdr)",borderRadius:6,padding:"3px 10px",fontSize:10,color:"var(--muted)"}}>Max 4 people</span>
            </div>
            <div className="card-sub">Add up to 4 trusted people (parent, guardian, advisor, or tutor) who can view your OnTrack planner. They receive <strong>read-only access</strong> — they can see your goals, appointments, courses, grades, and calendar, but <strong>cannot make any changes</strong>.</div>
            {(data.sharedWith||[]).map((email,i)=>(
              <div key={`share_${i}`} className="share-email-row">
                <input className="inp" style={{flex:1}} type="email" value={email} onChange={e=>{const a=[...(data.sharedWith||[])];a[i]=e.target.value.toLowerCase();setData(p=>({...p,sharedWith:a}));}} placeholder="email@example.com"/>
                <button className="btn btn-ghost btn-xs" onClick={()=>{const a=(data.sharedWith||[]).filter((_,j)=>j!==i);setData(p=>({...p,sharedWith:a}));}}>✕</button>
              </div>
            ))}
            {(data.sharedWith||[]).length<4&&(
              <button className="btn btn-ghost btn-sm" style={{marginTop:10}} onClick={()=>setData(p=>({...p,sharedWith:[...(p.sharedWith||[]),""]}))}>
                + Add Person ({4-(data.sharedWith||[]).length} remaining)
              </button>
            )}
            <div style={{marginTop:14,display:"flex",gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={async()=>{
                const cappedWith=(data.sharedWith||[]).slice(0,4);
                await save({sharedWith:cappedWith});
              const validEmails=cappedWith.filter(e=>e.includes("@")&&e.includes(".")&&e.indexOf("@")>0&&e.indexOf("@")<e.length-2).map(e=>e.toLowerCase().trim());
                // sync sharedEmails into mos document so rule can check without get()
                if(db&&user?.uid){
                  try{await db.collection("mos").doc(user.uid).set({sharedEmails:validEmails,sharedWith:cappedWith},{merge:true});}catch{}
                }
                if(validEmails.length){
                  const body=encodeURIComponent(`Hi,\n\n${data.profile.name||"Your student"} has shared their OnTrack at SU coaching planner with you.\n\nCoach: ${COACH_NAME} · ${COACH_EMAIL}\n\nThis is a read-only view of their progress and goals.\n\nIf you have questions, please contact the coach directly at ${COACH_PHONE}.\n\nOnTrack at SU | Center for Disability Resources | Syracuse University`);
                  window.open(`mailto:${validEmails.join(",")}?subject=OnTrack Planner Access - ${data.profile.name||"Student"}&body=${body}`);
                }
                showToast("✅ Saved & email opened!");
              }}>💾 Save & Notify</button>
            </div>
            <div style={{marginTop:12,fontSize:11,color:"var(--muted)",lineHeight:1.7}}>
              🔒 Read-only access only. Shared contacts can view your goals, appointments, courses, grades, and calendar — they cannot edit any data, access your session notes, or read coach messages. Remove access at any time by deleting their email and saving.
            </div>
          </div>
        </div>}
      </div>
      <CopyrightFooter/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP — AUTH ROUTER
═══════════════════════════════════════════════════════════ */
/* ── Error Boundary — catches any render crash and shows a recoverable screen ── */
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error("Portal render error:",error,info.componentStack);}
  render(){
    if(this.state.hasError){
      return(
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:24}}>
          <div style={{maxWidth:460,background:"var(--s1)",border:"1px solid var(--bdr)",borderRadius:14,padding:32,textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,marginBottom:8}}>Something went wrong</div>
            <div style={{fontSize:13,color:"var(--muted)",marginBottom:6}}>The portal hit an unexpected error. This is usually caused by data loading incorrectly. Try reloading — if it persists, sign out and back in.</div>
            <div style={{fontSize:11,color:"var(--dim)",marginBottom:20,fontFamily:"monospace",background:"var(--s2)",padding:"8px 12px",borderRadius:7,textAlign:"left",wordBreak:"break-all"}}>
              {this.state.error?.message||"Unknown error"}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
              <button className="btn btn-primary" onClick={()=>window.location.reload()}>🔄 Reload Page</button>
              <button className="btn btn-ghost" onClick={()=>{try{firebase.auth().signOut().then(()=>window.location.reload());}catch{window.location.reload();}}}>Sign Out &amp; Retry</button>
            </div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function App(){
  const [authState,setAuthState]=useState("loading");
  const [user,setUser]=useState(null);
  const [rosterEntry,setRosterEntry]=useState(null);
  const [sharedUid,setSharedUid]=useState(null); // uid of student whose planner shared contact can view
  const [toast,setToast]=useState(null);

  const showToast=useCallback((msg)=>{setToast(msg);setTimeout(()=>setToast(null),3500);},[]);

  useEffect(()=>{
    if(!IS_CONFIGURED){setAuthState("unconfigured");return;}
    const unsub=auth.onAuthStateChanged(async u=>{
      if(!u){setUser(null);setRosterEntry(null);setAuthState("unauth");}
      else{
        setUser(u);
        if(u.email===COACH_EMAIL){setAuthState("coach");}
        else{
          // ── Step 1: check if this email is on the coaching roster ──
          let onRoster=false;
          try{
            const q=await db.collection("roster").where("email","==",u.email.toLowerCase()).limit(1).get();
            if(!q.empty){
              const d=q.docs[0];
              setRosterEntry({id:d.id,...d.data()});
              onRoster=true;
              // Write uid back to roster so card flips Pending → Active (first login only)
              if(!d.data().uid){
                try{
                  await db.collection("roster").doc(d.id).update({uid:u.uid});
                }catch(rErr){console.error("Roster uid update failed — check Firestore rules:",rErr);}
              }
            }
          }catch(e){console.error("Roster lookup error:",e);}

          if(onRoster){
            // Roster student — full student portal
            setAuthState("student");
            provisionMOS(u.uid); // Only provision MOS for actual students
          }else{
            // ── Step 2: not a student — check if they have shared access ──
            let foundShared=false;
            let lookupFailed=false;
            try{
              const sq=await db.collection("mos")
                .where("sharedEmails","array-contains",u.email.toLowerCase())
                .limit(1).get();
              if(!sq.empty){
                setSharedUid(sq.docs[0].id);
                setAuthState("shared");
                foundShared=true;
              }
            }catch(sharedErr){
              console.warn("Shared access check failed:",sharedErr.message);
              lookupFailed=true;
            }
            if(!foundShared){
              setRosterEntry(null);
              // If both lookups failed (network issue) vs genuinely not registered
              setAuthState(lookupFailed?"noaccess":"noaccess");
              // Note: both paths show noaccess for now; toast gives context
              if(lookupFailed)console.warn("Auth lookup failed — user may be offline or Firestore unavailable");
            }
          }
        }
      }
    });
    return()=>unsub();
  },[]);

  if(authState==="loading")return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:12,animation:"spin 1s linear infinite",display:"inline-block"}}>🍊</div>
        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:"var(--txt)"}}>OnTrack at SU</div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>Loading coaching platform...</div>
      </div>
    </div>
  );

  return(
    <>
      {toast&&<div className="toast">{toast}</div>}
      {authState==="unconfigured"&&<SetupScreen/>}
      {authState==="unauth"&&<LoginScreen/>}
      {authState==="coach"&&<CoachDashboard user={user} showToast={showToast}/>}
      {authState==="student"&&<StudentPortal user={user} rosterEntry={rosterEntry} showToast={showToast}/>}
      {authState==="shared"&&sharedUid&&<SharedViewer sharedUid={sharedUid} showToast={showToast}/>}
      {authState==="noaccess"&&(
        <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{maxWidth:440,background:"var(--s1)",border:"1px solid var(--bdr)",borderRadius:14,padding:32,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🔒</div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20,marginBottom:8}}>No Access</div>
            <div style={{fontSize:13,color:"var(--muted)",marginBottom:20,lineHeight:1.7}}>
              This email address is not registered as a student or shared contact on this platform.
              If you were invited to view a student's planner, contact the coach to confirm access was set up.
            </div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:20}}>Coach: {COACH_NAME} · {COACH_EMAIL}</div>
            <button className="btn btn-ghost" onClick={()=>auth.signOut()}>← Sign Out</button>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("ot-root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
