<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#001a3a;--navy2:#002147;--orange:#F76900;--orange2:#ff9a3c;
  --bg:#09101e;--s1:#101828;--s2:#162034;--s3:#1e2d47;--s4:#253554;
  --bdr:#2a3a5c;--txt:#e2eaf8;--muted:#6b82a8;--dim:#4a5f84;
  --green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--yellow:#f59e0b;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--s2)}::-webkit-scrollbar-thumb{background:var(--orange);border-radius:2px}
input,textarea,select{outline:none;color-scheme:dark;font-family:'DM Sans',sans-serif}
a{color:inherit;text-decoration:none}
button{font-family:'DM Sans',sans-serif;cursor:pointer}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes flashPulse{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--orange)}50%{opacity:.85;box-shadow:0 0 0 6px transparent}}
@keyframes slideLeft{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.4);opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 12px var(--orange)44}50%{box-shadow:0 0 30px var(--orange)88}}

.fade{animation:fadeIn .3s ease both}
.slide{animation:slideLeft .25s ease both}
.spin{animation:spin 1s linear infinite}
.flash-btn{animation:flashPulse 1.2s ease infinite,glow 1.4s ease infinite}

/* ─── LAYOUT ─── */
.app-shell{display:flex;flex-direction:column;min-height:100vh}

.top-bar{
  background:linear-gradient(90deg,var(--navy) 0%,#001535 100%);
  border-bottom:2px solid var(--orange)55;
  height:52px;display:flex;align-items:center;padding:0 20px;
  justify-content:space-between;position:sticky;top:0;z-index:200;
  flex-shrink:0;
}
.top-brand{display:flex;align-items:center;gap:10px}
.top-badge{background:var(--orange);color:#fff;font-size:10px;font-weight:700;letter-spacing:.8px;padding:3px 9px;border-radius:4px}
.top-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--txt)}
.top-right{display:flex;align-items:center;gap:12px}
.top-contact{font-size:11px;color:var(--muted);display:flex;gap:14px}
.top-contact a{color:var(--muted);display:flex;align-items:center;gap:4px;transition:color .2s}
.top-contact a:hover{color:var(--orange)}

.coach-shell{display:flex;flex:1;overflow:hidden}
.sidebar{
  width:250px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow-y:auto;
}
.main-area{flex:1;overflow-y:auto;padding:20px}

/* ─── SIDEBAR ─── */
.sb-section{padding:14px 14px 6px;font-size:10px;color:var(--dim);font-weight:700;letter-spacing:1px;text-transform:uppercase;border-top:1px solid var(--bdr)}
.sb-section:first-child{border-top:none}
.sb-btn{
  display:flex;align-items:center;gap:9px;padding:8px 14px;
  background:transparent;border:none;color:var(--muted);width:100%;
  font-size:12px;font-weight:500;transition:all .15s;border-radius:0;
  cursor:pointer;text-align:left;
}
.sb-btn:hover{background:var(--s3);color:var(--txt)}
.sb-btn.active{background:var(--orange)18;color:var(--orange);border-left:3px solid var(--orange)}
.sb-btn .ico{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.sb-badge{margin-left:auto;background:var(--orange);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px}

/* ─── CARDS ─── */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-bottom:14px}
.card-title{font-family:'DM Serif Display',serif;font-size:15px;color:var(--txt);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.card-sub{font-size:11px;color:var(--muted);margin-bottom:14px}

/* ─── FORM ─── */
.lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.inp{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-radius:7px;padding:9px 12px;font-size:12px;width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--orange)77}
.inp::placeholder{color:var(--dim)}
.ta{resize:vertical;min-height:80px;line-height:1.65}
.sel{cursor:pointer;appearance:none}
.fg{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:none;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;box-shadow:0 3px 12px var(--orange)33}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 20px var(--orange)44}
.btn-primary:disabled{background:var(--bdr);box-shadow:none;transform:none;cursor:not-allowed;opacity:.6}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--muted)}
.btn-ghost:hover{border-color:var(--orange)66;color:var(--orange)}
.btn-green{background:linear-gradient(135deg,#059669,var(--green));color:#fff}
.btn-blue{background:linear-gradient(135deg,#1d4ed8,var(--blue));color:#fff}
.btn-red{background:linear-gradient(135deg,#b91c1c,var(--red));color:#fff}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px}

/* ─── STUDENT ROSTER ─── */
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.student-card{
  background:var(--s1);border:1px solid var(--bdr);border-radius:10px;
  padding:12px;cursor:pointer;transition:all .2s;position:relative;
}
.student-card:hover{border-color:var(--orange)55;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.student-card.active{border-color:var(--orange);background:var(--orange)0d}
.sc-num{position:absolute;top:8px;right:10px;font-size:9px;color:var(--dim);font-weight:700}
.sc-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;margin-bottom:8px}
.sc-name{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:2px}
.sc-meta{font-size:10px;color:var(--muted)}
.sc-tag{display:inline-block;font-size:9px;font-weight:700;border-radius:4px;padding:1px 6px;margin-top:5px}
.sc-empty{border-style:dashed;opacity:.45}
.sc-empty:hover{opacity:.7}
.unread-dot{position:absolute;top:10px;left:10px;width:8px;height:8px;border-radius:50%;background:var(--orange);animation:flashPulse 1s infinite}

/* ─── MESSAGES ─── */
.msg-card{
  background:var(--s2);border:1px solid var(--bdr);border-radius:9px;
  padding:12px 14px;margin-bottom:8px;transition:background .15s;
}
.msg-card.unread{border-color:var(--orange)44;background:var(--orange)08}
.msg-card:hover{background:var(--s3)}

/* ─── COACH MAIL BANNER ─── */
.coach-mail-banner{
  background:linear-gradient(135deg,var(--orange)22,var(--orange)11);
  border:2px solid var(--orange);border-radius:12px;
  padding:14px 18px;margin-bottom:16px;
  display:flex;align-items:center;gap:12px;
  animation:glow 1.5s ease infinite;
  cursor:pointer;
}
.mail-dot{width:12px;height:12px;border-radius:50%;background:var(--orange);animation:blink 1s ease infinite;flex-shrink:0}

/* ─── STUDENT TABS ─── */
.stab-bar{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:18px;overflow-x:auto}
.stab{padding:8px 14px;background:none;border:none;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.stab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700}

/* ─── LOGIN ─── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#001535 0%,var(--bg) 70%)}
.login-box{background:var(--s1);border:1px solid var(--bdr);border-radius:18px;padding:36px;width:400px;max-width:95vw;animation:fadeIn .4s ease}
.login-logo{text-align:center;margin-bottom:24px}
.login-badge{display:inline-block;background:var(--orange);color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 12px;border-radius:5px;margin-bottom:8px}
.login-title{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted)}
.login-footer{font-size:11px;color:var(--muted);text-align:center;margin-top:16px}

/* ─── SETUP ─── */
.setup-wrap{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#001535 0%,var(--bg) 70%);padding:40px 20px;overflow-y:auto}
.setup-box{max-width:700px;margin:0 auto;animation:fadeIn .4s ease}
.setup-step{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:14px}
.setup-step-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--orange);color:#fff;font-size:11px;font-weight:700;flex-shrink:0;margin-right:8px}
.code-block{background:#060d18;border:1px solid var(--bdr);border-radius:8px;padding:14px;font-family:monospace;font-size:11px;color:#7dd3fc;line-height:1.7;overflow-x:auto;margin:10px 0}
.code-comment{color:var(--dim)}

/* ─── SHARE ─── */
.share-email-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr)}

/* ─── MISC ─── */
.tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;border-radius:4px;padding:2px 7px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.divider{border:none;border-top:1px solid var(--bdr);margin:16px 0}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .es-ico{font-size:40px;margin-bottom:10px;opacity:.3}
.toast{position:fixed;top:60px;right:16px;z-index:9999;background:var(--s1);border:1px solid var(--green)55;border-radius:10px;padding:10px 16px;font-size:12px;font-weight:600;color:var(--green);box-shadow:0 6px 24px rgba(0,0,0,.5);animation:fadeIn .25s ease}

/* ─── SESSION NOTE RECORDER ─── */
.rec-btn{width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--red),#9b1c1c);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative}
.rec-btn:hover{transform:scale(1.06)}
.rec-btn.active{background:linear-gradient(135deg,#9b1c1c,#7f1d1d)}
.rec-ripple{position:absolute;inset:-8px;border-radius:50%;border:2px solid var(--red);animation:ripple 1.1s ease infinite}
.progress-ring-wrap{position:relative;width:90px;height:90px;margin:0 auto 10px}
.prog-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--muted)}

/* RESPONSIVE */
@media(max-width:640px){
  .sidebar{width:200px}
  .roster-grid{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
}
/* ─── COPYRIGHT FOOTER ─── */
.copyright-footer{
  background:linear-gradient(90deg,#060d18 0%,#0a1628 50%,#060d18 100%);
  border-top:1px solid var(--bdr);
  padding:14px 24px;
  text-align:center;
  font-size:10px;
  color:var(--dim);
  letter-spacing:.4px;
  line-height:1.8;
  flex-shrink:0;
}
.copyright-footer strong{color:var(--muted);font-weight:600;}
.copyright-footer .cf-mark{color:var(--orange);font-weight:700;margin-right:4px;}

/* ─── MOS COMPONENT ANIMATIONS ─── */
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes noteIn{from{transform:scale(0.85) rotate(-3deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
.goal-card{animation:fadeUp 0.25s ease both}
.sticky-note{animation:noteIn 0.2s ease both}
</style>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

let auth,db;

/* ─── CONSTANTS ─── */
const O="#F76900";
const APPT_TYPES=[
  {v:"prof_oh",l:"📚 Professor Office Hours",c:"#60a5fa"},

];

  profile:{name:"",studentId:"",cell:"",dorm:"",major:"",year:"",
    parent1Name:"",parent1Cell:"",parent1Email:"",
    parent2Name:"",parent2Cell:"",parent2Email:""},

/* ─── HELPERS ─── */
const todayYMD=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
const fmtDate=(s)=>{if(!s)return"—";const d=new Date(s+"T00:00:00");return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});};
const initials=(n="")=>n.split(" ").map(w=>w[0]||"").slice(0,2).join("").toUpperCase()||"?";
const avatarColor=(n="")=>{const cols=["#F76900","#3b82f6","#10b981","#8b5cf6","#f59e0b","#ef4444","#ec4899","#06b6d4"];return cols[n.charCodeAt(0)%cols.length]||O;};
const ts2str=(ts)=>{if(!ts)return"";try{const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});}catch{return"";}};

/* ═══════════════════════════════════════════════════════════
   SETUP SCREEN — shown when Firebase config is placeholder
═══════════════════════════════════════════════════════════ */
function SetupScreen(){
  return(
    <div className="setup-wrap">
      <div className="setup-box">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"inline-block",background:O,color:"#fff",fontSize:11,fontWeight:700,letterSpacing:.8,padding:"4px 12px",borderRadius:5,marginBottom:10}}>OnTrack at SU</div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:26,marginBottom:6}}>Coaching Platform Setup</div>
          <div style={{fontSize:12,color:"var(--muted)"}}>Complete these 4 steps to connect your Firebase backend — takes about 10 minutes</div>
        </div>

        {[
          {n:1,title:"Create a Firebase Project",body:<>
            <p style={{fontSize:12,color:"var(--muted)",marginBottom:10,lineHeight:1.7}}>Go to <a href="https://console.firebase.google.com" target="_blank" style={{color:O}}>console.firebase.google.com</a> → click <strong>"Add project"</strong> → name it <strong>OnTrack-SU-Coaching</strong> → disable Google Analytics (not needed) → create.</p>
          </>},
          {n:2,title:"Enable Authentication & Firestore",body:<>
            <p style={{fontSize:12,color:"var(--muted)",marginBottom:8,lineHeight:1.7}}>In your new project:<br/>
            • <strong>Build → Authentication</strong> → Get started → Enable <strong>Email/Password</strong> sign-in<br/>
            • <strong>Build → Firestore Database</strong> → Create database → choose <strong>Production mode</strong> → pick closest region</p>
          </>},
          {n:3,title:"Paste Your Config into This File",body:<>
            <p style={{fontSize:12,color:"var(--muted)",marginBottom:8,lineHeight:1.7}}>In Firebase Console → <strong>Project Settings</strong> (gear icon) → <strong>Your apps</strong> → click the Web icon (<code>&lt;/&gt;</code>) → Register app → copy the <code>firebaseConfig</code> object.</p>
            <p style={{fontSize:12,color:"var(--muted)",marginBottom:8}}>Open this HTML file in a text editor and replace the placeholder values near the top:</p>
            <div className="code-block">
              <span className="code-comment">// Replace each "YOUR_..." value with your real config:</span>{"\n"}
              const FIREBASE_CONFIG = {"{"}{"\n"}
              {"  "}apiKey: <span style={{color:"#fca5a5"}}>"YOUR_API_KEY"</span>,{"\n"}
              {"  "}authDomain: <span style={{color:"#fca5a5"}}>"my-coaching-platform-adf74.firebaseapp.com"</span>,{"\n"}
              {"  "}projectId: <span style={{color:"#fca5a5"}}>"my-coaching-platform-adf74"    </span>,{"\n"}
              {"  "}...{"\n"}
              {"}"};
            </div>
          </>},
          {n:4,title:"Set Firestore Security Rules",body:<>
            <p style={{fontSize:12,color:"var(--muted)",marginBottom:8,lineHeight:1.7}}>In Firebase Console → <strong>Firestore → Rules</strong> → replace all content with:</p>
            <div className="code-block" style={{fontSize:10}}>
              {`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function isCoach() {
      return request.auth != null &&
        request.auth.token.email == "${COACH_EMAIL}";
    }
    // Coach can read/write everything
    match /{document=**} {
      allow read, write: if isCoach();
    }
    // Students: read/write own data only
    match /students/{uid} {
      allow read, write: if request.auth.uid == uid;
    }
    // MyOrangeSuccess: student owns + writes their data
    // Shared contacts (parents/guardians) get READ-ONLY access — no write rule
    match /mos/{uid} {
      allow read, write: if request.auth.uid == uid;
      // Shared contacts: read-only — no matching write rule means Firestore denies writes
      allow read: if request.auth != null &&
        resource.data.sharedEmails is list &&
        resource.data.sharedEmails.hasAny([request.auth.token.email]);
    }
    // Roster: students can read; can write ONLY their own uid on first login
    match /roster/{docId} {
      allow read: if request.auth != null;
      allow update: if request.auth != null
        && request.resource.data.uid == request.auth.uid
        && resource.data.uid == ""
        && request.resource.data.diff(resource.data).affectedKeys().hasOnly(["uid"]);
    }
    // ════════════════════════════════════════════════════
    // SESSION NOTES — COACH ONLY · FERPA PROTECTED
    // Students, parents, and shared contacts CANNOT
    // access this collection under ANY circumstances.
    // ════════════════════════════════════════════════════
    match /sessionNotes/{noteId} {
      allow read, write: if isCoach();
      // No student, parent, or shared-contact rule — deny by default
    }
    // Students: read messages + update readBy (mark as read)
    match /messages/{msgId} {
      allow read: if request.auth != null &&
        (resource.data.to == request.auth.uid ||
         resource.data.to == "ALL");
      allow update: if request.auth != null &&
        (resource.data.to == request.auth.uid ||
         resource.data.to == "ALL") &&
        request.resource.data.diff(resource.data).affectedKeys().hasOnly(["readBy"]);
    }
  }
}`}
            </div>
          </>},
        ].map(s=>(
          <div key={s.n} className="setup-step fade">
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span className="setup-step-num">{s.n}</span>
              <span style={{fontWeight:700,fontSize:14}}>{s.title}</span>
            </div>
            {s.body}
          </div>
        ))}

        <div className="setup-step fade" style={{borderColor:O+"44",background:O+"0a"}}>
          <div style={{fontWeight:700,fontSize:13,color:O,marginBottom:8}}>✅ After Setup</div>
          <p style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>
            Reload this file after pasting your config. Log in with your SU email (<strong style={{color:"var(--txt)"}}>{COACH_EMAIL}</strong>) and create your password. Then use <strong style={{color:"var(--txt)"}}>Manage Students</strong> to add each of your 20 students by name and SU email. Students visit this same file, create their account with their SU email, and their planner is automatically linked to your coaching roster.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════════════════════ */
function LoginScreen(){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [isNew,setIsNew]=useState(false);
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const submit=async()=>{
    if(!email||!pass){setErr("Enter email and password.");return;}
    setLoading(true);setErr("");
    try{
      if(isNew){
        await auth.createUserWithEmailAndPassword(email,pass);
      }else{
        await auth.signInWithEmailAndPassword(email,pass);
      }
    }catch(e){
      setErr(e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"?"Incorrect password."
        :e.code==="auth/user-not-found"?"Account not found — try 'Create Account'."
        :e.code==="auth/email-already-in-use"?"Account already exists — sign in instead."
        :e.code==="auth/weak-password"?"Password must be at least 6 characters."
        :e.code==="auth/invalid-email"?"Enter a valid email address."
        :e.message||"Login failed. Try again.");
    }finally{setLoading(false);}
  };

  return(
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">
          <div className="login-badge">OnTrack at SU</div>
          <div className="login-title" style={{fontFamily:"'DM Serif Display',serif"}}>Coaching Platform</div>
          <div className="login-sub">{COACH_NAME} · {COACH_TITLE}</div>
        </div>
        <div className="fg">
          <div className="lbl">SU Email Address</div>
          <input className="inp" type="email" placeholder="your@syr.edu" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        <div className="fg">
          <div className="lbl">Password</div>
          <input className="inp" type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        {err&&<div style={{fontSize:11,color:"var(--red)",marginBottom:10,background:"var(--red)11",border:"1px solid var(--red)33",borderRadius:6,padding:"6px 10px"}}>{err}</div>}
        <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",marginBottom:10}} onClick={submit} disabled={loading}>
          {loading?<span className="spin" style={{fontSize:14}}>⟳</span>:null}
          {isNew?"Create Account":"Sign In"}
        </button>
        <div style={{textAlign:"center"}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setIsNew(!isNew);setErr("");}}>
            {isNew?"Already have an account? Sign In":"First time? Create Account"}
          </button>
        </div>
        <div className="login-footer">
          📱 {COACH_PHONE} &nbsp;·&nbsp; ✉️ {COACH_EMAIL}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SESSION NOTE RECORDER (integrated from standalone tool)
═══════════════════════════════════════════════════════════ */
function SessionNotePanel({studentName,studentId,coachEmail,onSaved,showToast}){
  const [step,setStep]=useState(1);
  const [isRec,setIsRec]=useState(false);
  const [recSeconds,setRecSeconds]=useState(0);
  const [pct,setPct]=useState(0);
  const [pctLabel,setPctLabel]=useState("");
  const [f,setF]=useState({student:studentName||"",sid:studentId||"",date:todayYMD(),num:"",dur:"50",mode:"In-Person",agenda:"",checkin:"",notes:""});
  const [note,setNote]=useState({});
  const recRef=useRef(null);
  const isRecRef=useRef(false); // ref tracks live recording state for onend closure
  const finalRef=useRef("");
  const pctInt=useRef(null);
  const recTimerRef=useRef(null);
  const pctRef=useRef(0); // tracks current animated pct value for animPct closure

  // Clean up all intervals on unmount
  useEffect(()=>()=>{clearInterval(pctInt.current);clearInterval(recTimerRef.current);},[]);

  // Elapsed recording timer — ticks every second while isRec is true
  useEffect(()=>{
    if(isRec){
      recTimerRef.current=setInterval(()=>setRecSeconds(s=>s+1),1000);
    }else{
      clearInterval(recTimerRef.current);
    }
    return()=>clearInterval(recTimerRef.current);
  },[isRec]);

  const upd=(k,v)=>setF(p=>({...p,[k]:v}));

  const animPct=(target,label,dur)=>{
    clearInterval(pctInt.current);
    setPctLabel(label);
    let start=pctRef.current,steps=30,step2=0;
    pctInt.current=setInterval(()=>{
      step2++;const p=start+(target-start)*(step2/steps);
      const rounded=Math.round(p);pctRef.current=rounded;
      setPct(rounded);if(step2>=steps)clearInterval(pctInt.current);
    },dur/steps);
  };

  const fmtRecTime=(s)=>{
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    if(h>0)return`${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
    return`${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  };

  const toggleRec=()=>{
    if(isRec){
      isRecRef.current=false; // set ref BEFORE stop() so onend sees it immediately
      recRef.current?.stop();
      setIsRec(false);
    }
    else{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SR){showToast("Voice requires Chrome or Edge");return;}
      setRecSeconds(0); // reset elapsed timer on each new recording
      const r=new SR();r.continuous=true;r.interimResults=true;r.lang="en-US";
      finalRef.current=f.notes||"";
      r.onstart=()=>setIsRec(true); // confirm recording actually started
      r.onresult=e=>{let iv="";
        for(let i=e.resultIndex;i<e.results.length;i++){
          const t=e.results[i][0].transcript;
          if(e.results[i].isFinal)finalRef.current+=(finalRef.current?"\n":"")+t;
          else iv=t;
        }
        upd("notes",finalRef.current+(iv?" "+iv:""));
      };
      r.onerror=e=>{
        // Fatal errors: stop recording completely and alert the user
        const fatal=["not-allowed","audio-capture","service-not-allowed"].includes(e.error);
        if(fatal){isRecRef.current=false;setIsRec(false);showToast(`🎤 Mic error: ${e.error} — check browser mic permissions`);}
        // Non-fatal (no-speech, network, aborted): onend fires and restarts automatically
      };
      r.onend=()=>{if(isRecRef.current)r.start();}; // reads ref, not stale closure
      r.start();recRef.current=r;isRecRef.current=true;
      // Note: setIsRec(true) is called by r.onstart for accurate confirmation
    }
  };

  const generate=async()=>{
    if(!f.notes&&!f.agenda&&!f.checkin){showToast("Add session notes first");return;}
    // Stop recording cleanly before generating so the mic is released
    if(isRec){isRecRef.current=false;recRef.current?.stop();setIsRec(false);}
    setStep(2);animPct(25,"Analyzing notes...",600);
    const sys=`You are an expert ICF-certified coaching note writer for the OnTrack program at Syracuse University's Center for Disability Resources. This program provides individual coaching to neurodivergent college students (ADHD, ASD, learning differences, LD).

IMPORTANT: The raw notes below may be voice-dictated (containing filler words, incomplete sentences, repetition, or informal speech). Clean and interpret this content professionally. Extract meaning even from fragmented or conversational input.

Generate a complete structured coaching session note. Return ONLY valid JSON — no markdown, no preamble, no code fences. Use these exact keys:
- sessionGoals: What the student intended to work on this session
- preSessionCheckin: Student emotional state, energy, mood, recent context
- keyDiscussionPoints: Main topics explored in the session
- strategiesIdentified: Specific tools, strategies, or frameworks discussed
- studentInsights: Self-awareness moments, realizations, breakthroughs
- barriersAddressed: Obstacles, avoidance patterns, or challenges explored
- efFocusAreas: Executive function domains addressed (initiation, planning, time mgmt, working memory, etc)
- actionSteps: Concrete next steps student committed to before next session
- coachObservations: Clinical coach observations — tone, affect, patterns, concerns (confidential)
- sessionOutcomes: Progress made and outcomes achieved this session
- nextSessionFocus: Priority topics for next session
- referrals: Campus resources referenced or referrals made
- coachingCompetencies: ICF competencies demonstrated (e.g. Active Listening, Powerful Questions)

Write in professional third-person. Use bullet points (•) for lists. Each section should be 2-5 sentences or bullets minimum — extract every relevant detail from the notes. If a field has no content in the notes, write 'Not documented this session.'`;
    const msg=`Student: ${f.student}${f.sid?" (ID: "+f.sid+")":""}\nSession #${f.num||"?"} | ${f.date} | ${f.dur} min | ${f.mode}\nAgenda: ${f.agenda||"(not documented)"}\nCheck-in: ${f.checkin||"(not documented)"}\nNotes:\n${f.notes}`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL,max_tokens:2000,system:sys,messages:[{role:"user",content:msg}]})});
      if(!res.ok)throw new Error(`API ${res.status}`);
      animPct(65,"Structuring note...",800);
      const d=await res.json();const raw=d.content?.[0]?.text||"{}";
      animPct(90,"Formatting...",400);
      let parsed;try{parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{const m=raw.match(/\{[\s\S]*\}/);parsed=m?JSON.parse(m[0]):{};}
      setNote({...f,...parsed});
      setTimeout(()=>{animPct(100,"Done!",200);setTimeout(()=>setStep(3),300);},300);
    }catch(e){
      clearInterval(pctInt.current); // stop animation on failure
      setPct(0);pctRef.current=0; // reset progress so next attempt starts clean
      showToast(`AI error — ${e.message||"check connection"}`);
      setStep(1);
    }
  };

  const [savingNote,setSavingNote]=useState(false);
  const [cleaning,setCleaning]=useState(false);

  const cleanTranscript=async()=>{
    if(!f.notes.trim()){showToast("Nothing to clean — record or type notes first");return;}
    setCleaning(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:MODEL,max_tokens:2000,
          system:"You are a transcription editor. Clean up voice-dictated coaching notes: remove filler words (um, uh, like, you know), fix sentence structure, remove repetition, but preserve all specific details, names, dates, and coaching content. Return ONLY the cleaned text with no preamble.",
          messages:[{role:"user",content:"Clean this voice transcription:\n\n"+f.notes}]})
      });
      if(!res.ok)throw new Error(`API ${res.status}`);
      const d=await res.json();
      const cleaned=d.content?.[0]?.text||f.notes;
      upd("notes",cleaned);
      finalRef.current=cleaned;
      showToast("🧹 Transcript cleaned!");
    }catch(e){showToast("Clean failed: "+(e.message||"check connection"));}
    finally{setCleaning(false);}
  };

  const saveNote=async()=>{
    if(!db){showToast("Firebase not connected");return;}
    if(savingNote)return;
    setSavingNote(true);
    try{
      await db.collection("sessionNotes").add({
        studentSUID:f.sid||"",studentName:f.student,
        coachEmail,sessionDate:f.date,sessionNum:parseInt(f.num,10)||0,
        sessionData:{...f,...note,rawNotes:f.notes},createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast("✅ Session note saved to Firebase!");
      if(onSaved)onSaved();
    }catch(e){showToast("Save failed: "+e.message);}
    finally{setSavingNote(false);}
  };

  const exportOutlook=()=>{
    const lines=(k,l)=>note[k]?`\n${l}\n${note[k]}\n`:"";
    const body=`ONTRACK AT SU — COACHING SESSION NOTE\n${"=".repeat(50)}\nCoach: ${COACH_NAME}, ${COACH_TITLE}\nPhone: ${COACH_PHONE} | Email: ${coachEmail}\n\nStudent: ${note.student||"—"}  |  Session #${note.num||"—"}  |  ${fmtDate(note.date)}  |  ${note.dur} min  |  ${note.mode}\n${"─".repeat(50)}${lines("sessionGoals","🎯 SESSION GOALS")}${lines("preSessionCheckin","💭 PRE-SESSION CHECK-IN")}${lines("keyDiscussionPoints","🗣️ KEY DISCUSSION POINTS")}${lines("strategiesIdentified","🔧 STRATEGIES IDENTIFIED")}${lines("studentInsights","💡 STUDENT INSIGHTS")}${lines("barriersAddressed","🚧 BARRIERS ADDRESSED")}${lines("efFocusAreas","🧠 EXECUTIVE FUNCTION AREAS")}${lines("actionSteps","✅ ACTION STEPS")}${lines("coachObservations","🔒 COACH OBSERVATIONS (Confidential)")}${lines("sessionOutcomes","📈 OUTCOMES")}${lines("nextSessionFocus","🔭 NEXT SESSION FOCUS")}${lines("referrals","🏥 REFERRALS")}${lines("coachingCompetencies","🎓 ICF COMPETENCIES")}\n${"=".repeat(50)}\nConfidential — subject to FERPA/HIPAA guidelines.`;
    const sub=encodeURIComponent(`OnTrack Session Note — ${note.student||"Student"} — Session #${note.num||"?"} — ${note.date||""}`);
    window.open(`mailto:${coachEmail}?subject=${sub}&body=${encodeURIComponent(body)}`);
  };

  const SECTIONS=[
    {k:"sessionGoals",l:"🎯 Session Goals"},
    {k:"preSessionCheckin",l:"💭 Pre-Session Check-In"},
    {k:"keyDiscussionPoints",l:"🗣️ Key Discussion Points"},
    {k:"strategiesIdentified",l:"🔧 Strategies Identified"},
    {k:"studentInsights",l:"💡 Student Insights"},
    {k:"barriersAddressed",l:"🚧 Barriers Addressed"},
    {k:"efFocusAreas",l:"🧠 Executive Function Focus"},
    {k:"actionSteps",l:"✅ Action Steps"},
    {k:"coachObservations",l:"🔒 Coach Observations (Confidential)"},
    {k:"sessionOutcomes",l:"📈 Session Outcomes"},
    {k:"nextSessionFocus",l:"🔭 Next Session Focus"},
    {k:"referrals",l:"🏥 Referrals"},
    {k:"coachingCompetencies",l:"🎓 ICF Competencies"},
  ];

  if(step===1)return(
    <div>
      <div className="card">
        <div className="card-title">📋 Session Information</div>
        <div className="g3" style={{marginBottom:10}}>
          <div className="fg"><div className="lbl">Student Name</div><input className="inp" value={f.student} onChange={e=>upd("student",e.target.value)} placeholder="Full name" spellCheck/></div>
          <div className="fg"><div className="lbl">Student ID</div><input className="inp" value={f.sid} onChange={e=>upd("sid",e.target.value)} placeholder="ID number"/></div>
          <div className="fg"><div className="lbl">Session #</div><input className="inp" type="number" value={f.num} onChange={e=>upd("num",e.target.value)} placeholder="e.g. 3"/></div>
        </div>
        <div className="g3" style={{marginBottom:10}}>
          <div className="fg"><div className="lbl">Date</div><input className="inp" type="date" value={f.date} onChange={e=>upd("date",e.target.value)}/></div>
          <div className="fg"><div className="lbl">Duration (min)</div><input className="inp" type="number" value={f.dur} onChange={e=>upd("dur",e.target.value)}/></div>
          <div className="fg"><div className="lbl">Modality</div><select className="inp sel" value={f.mode} onChange={e=>upd("mode",e.target.value)}><option>In-Person</option><option>Zoom / Video</option><option>Phone</option></select></div>
        </div>
        <div className="fg"><div className="lbl">Student's Agenda / Presenting Concern</div><textarea className="inp ta" value={f.agenda} onChange={e=>upd("agenda",e.target.value)} placeholder="What did the student want to work on?" spellCheck style={{minHeight:60}}/></div>
        <div className="fg"><div className="lbl">Pre-Session Check-In</div><textarea className="inp ta" value={f.checkin} onChange={e=>upd("checkin",e.target.value)} placeholder="Student's state, energy, mood, what's been happening..." spellCheck style={{minHeight:60}}/></div>
      </div>
      <div className="card">
        <div className="card-title">🎙️ Session Notes</div>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}>
          <button className={`rec-btn${isRec?" active":""}`} onClick={toggleRec}>
            {isRec?"⏹":"🎤"}
            {isRec&&<div className="rec-ripple"/>}
          </button>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:isRec?"var(--red)":"var(--txt)",display:"flex",alignItems:"center",gap:8}}>
              {isRec
                ?<><span>● Recording</span><span style={{background:"var(--red)22",border:"1px solid var(--red)44",borderRadius:6,padding:"1px 8px",fontFamily:"monospace",fontSize:13,color:"var(--red)",letterSpacing:1}}>{fmtRecTime(recSeconds)}</span>
                  {recSeconds>=3600&&<span style={{fontSize:10,color:"var(--orange)",fontWeight:700}}>1h+</span>}</>
                :"Click mic to start voice dictation"}
            </div>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>
              {isRec
                ?`${f.notes.split(/\s+/).filter(Boolean).length} words · ${f.notes.length} chars captured`
                :"Works in Chrome/Edge · No time limit · Type or speak freely — use 🧹 Clean before generating"}
            </div>
          </div>
        </div>
        <div className="fg"><textarea className="inp ta" value={f.notes} onChange={e=>upd("notes",e.target.value)} style={{minHeight:180}} placeholder="Add everything you observed and discussed — don't worry about format, the AI will structure it all. Include what was discussed, strategies, concerns, what the student committed to..." spellCheck/></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-primary" onClick={generate} disabled={cleaning}>✨ Generate Structured Note →</button>
          {f.notes.length>20&&<button className="btn btn-ghost btn-sm" onClick={cleanTranscript} disabled={cleaning} title="Remove filler words and clean up voice dictation before generating">
            {cleaning?"🧹 Cleaning...":"🧹 Clean Transcript"}
          </button>}
          <button className="btn btn-ghost btn-sm" onClick={()=>{upd("notes","");finalRef.current="";setRecSeconds(0);}}>🗑 Clear</button>
        </div>
      </div>
    </div>
  );

  if(step===2)return(
    <div className="card" style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:32,marginBottom:12}}>✨</div>
      <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,marginBottom:6}}>Generating Session Note</div>
      <div style={{fontSize:12,color:"var(--muted)",marginBottom:24}}>AI is reading your notes and building a structured coaching document...</div>
      <div className="progress-ring-wrap">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="var(--bdr)" strokeWidth="6"/>
          <circle cx="45" cy="45" r="38" fill="none" stroke={O} strokeWidth="6" strokeLinecap="round"
            strokeDasharray="238" strokeDashoffset={238-(238*pct/100)} transform="rotate(-90 45 45)" style={{transition:"stroke-dashoffset .4s"}}/>
        </svg>
        <div className="prog-text">
          <div style={{fontSize:18,fontWeight:700,color:O}}>{pct}%</div>
          <div style={{fontSize:9}}>{pctLabel}</div>
        </div>
      </div>
      <div style={{fontSize:11,color:"var(--muted)"}}>{pct<40?"Analyzing...":pct<80?"Structuring...":"Almost done..."}</div>
    </div>
  );

  return(
    <div>
      <div className="card" style={{borderColor:O+"44",background:"linear-gradient(135deg,#001328,var(--s1))"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:9,color:O,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>OnTrack at SU — Confidential Session Note</div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:20}}>{note.student||"Student"} — Session {note.num||"#?"}</div>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>{fmtDate(note.date)} · {note.dur} min · {note.mode}</div>
          </div>
          <div style={{textAlign:"right",fontSize:11,color:"var(--muted)"}}>
            <div style={{fontWeight:700,color:"var(--txt)"}}>{COACH_NAME}, {COACH_TITLE}</div>
            <div>OnTrack | CDR | {COACH_PHONE}</div>
          </div>
        </div>
      </div>
      {SECTIONS.map(s=>(
        <div key={s.k} className="card fade" style={{padding:"14px 16px",borderLeft:`3px solid ${O}55`,marginBottom:8}}>
          <div style={{fontSize:10,color:O,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:6}}>{s.l}</div>
          <textarea className="inp" style={{background:"transparent",border:"none",width:"100%",resize:"vertical",fontSize:12,lineHeight:1.75,color:"var(--txt)",minHeight:56}} value={note[s.k]||""} onChange={e=>setNote(p=>({...p,[s.k]:e.target.value}))} spellCheck/>
        </div>
      ))}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6}}>
        <button className="btn btn-green" onClick={saveNote} disabled={savingNote}>{savingNote?"Saving...":"💾 Save to Firebase"}</button>
        <button className="btn btn-blue" onClick={exportOutlook}>✉️ Send to Outlook</button>
        <button className="btn btn-ghost" onClick={()=>{navigator.clipboard?.writeText(SECTIONS.map(s=>`${s.l}\n${note[s.k]||""}`).join("\n\n")).then(()=>showToast("📋 Copied!")).catch(()=>showToast("Copy unavailable"));}}>📋 Copy</button>
        <button className="btn btn-ghost" style={{marginLeft:"auto"}} onClick={()=>{setStep(1);setPct(0);pctRef.current=0;}}>🔄 New Note</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════

/* ── HELPERS (todayYMD + fmtDate defined in OnTrack base above) ── */
// fmtDate defined in OnTrack base
const dateToYMD=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const getMondayDate=(wo=0)=>{const t=new Date();const dow=t.getDay();const diff=dow===0?-6:1-dow;const m=new Date(t);m.setDate(t.getDate()+diff+wo*7);return m;};
const getWeekDates=(wo)=>Array.from({length:7},(_,i)=>{const d=getMondayDate(wo);d.setDate(d.getDate()+i);return dateToYMD(d);});
const avgToLetter=(a)=>{if(a===null||a===undefined)return"—";if(a>=93)return"A";if(a>=90)return"A-";if(a>=87)return"B+";if(a>=83)return"B";if(a>=80)return"B-";if(a>=77)return"C+";if(a>=73)return"C";if(a>=70)return"C-";if(a>=60)return"D";return"F";};
const ltGpa=(l)=>({A:4.0,"A-":3.7,"B+":3.3,B:3.0,"B-":2.7,"C+":2.3,C:2.0,"C-":1.7,D:1.0,F:0.0}[l]??0);
const gc=(a)=>a>=90?"#34d399":a>=80?"#60a5fa":a>=70?"#fbbf24":a>=60?"#f97316":"#f87171";
const getCourseAvg=(c)=>{if(!c.grades?.length)return null;const g=c.grades.filter(x=>x.weight>0&&x.score!==""&&x.maxScore>0);if(!g.length)return null;let tw=0,ep=0;g.forEach(x=>{ep+=(parseFloat(x.score)/parseFloat(x.maxScore))*100*(x.weight/100);tw+=x.weight;});if(tw<=0)return null;return Math.round((ep/(tw/100))*10)/10;};
const calcGPA=(cs)=>{let tp=0,tc=0;cs.forEach(c=>{const a=getCourseAvg(c);if(a!==null&&c.credits){tp+=ltGpa(avgToLetter(a))*c.credits;tc+=c.credits;}});return tc>0?(tp/tc).toFixed(2):null;};
const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
const firstDay=(y,m)=>new Date(y,m,1).getDay();

const playBeep=(freq=880,vol=0.3,dur=0.7)=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch{}};

/* ── SYLLABUS PARSER ── */
async function parseSyllabus(content,isPdf,mediaType="application/pdf"){
  const p=`Extract from this syllabus. Return ONLY valid JSON, no markdown:\n{"courseName":"","courseCode":"","credits":3,"prof":{"name":"","email":"","phone":"","office":"","hours":""},"grades":[{"name":"Exams","weight":40,"type":"exam"}],"events":[{"title":"Exam 1","date":"2026-10-15","type":"exam","description":""}]}\nEvent types: exam,paper,project,homework,quiz,reading,other\n${!isPdf?"Syllabus:\n"+content.slice(0,8000):""}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL,max_tokens:1000,system:"You are an academic data extraction assistant. Extract structured course information from syllabi accurately. Always return only valid JSON with no markdown fences or extra commentary.",messages:[{role:"user",content:isPdf?[{type:"document",source:{type:"base64",media_type:mediaType,data:content}},{type:"text",text:p}]:[{type:"text",text:p}]}]})});
    if(!r.ok)throw new Error(`API ${r.status}`);
    const d=await r.json();const t=d.content?.[0]?.text||"{}";
    return JSON.parse(t.replace(/```json|```/g,"").trim());
  }catch(e){console.error("parseSyllabus error:",e.message);return{};}
}

function TimerWidget({onClose,showToast}){
  const [mode,setMode]=useState("pomodoro");
  const [running,setRunning]=useState(false);
  const [phase,setPhase]=useState("work");
  const [time,setTime]=useState(1500);
  const [total,setTotal]=useState(1500);
  const [study,setStudy]=useState(0);
  const [sessions,setSessions]=useState(0);
  const [mins,setMins]=useState(25);
  const intRef=useRef(null);
  const fmt=(s)=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  useEffect(()=>{
    if(!running)return;
    intRef.current=setInterval(()=>{
      if(mode==="study"){setStudy(s=>s+1);return;}
      setTime(t=>{
        if(t>1)return t-1;
        // Timer hit zero — signal completion via time=0, side effects handled below
        return 0;
      });
    },1000);
    return()=>clearInterval(intRef.current);
  },[running,mode,phase]);

  // Handle timer completion: fires when time reaches 0 while running
  const prevTimeRef=useRef(null);
  useEffect(()=>{
    if(!running||mode==="study"||time!==0)return;
    if(prevTimeRef.current===0)return; // already handled this zero
    prevTimeRef.current=0;
    clearInterval(intRef.current);
    playBeep(880,0.3,0.5);setTimeout(()=>playBeep(1100,0.2,0.4),600);
    if(mode==="pomodoro"){
      if(phase==="work"){
        setSessions(s=>s+1);setPhase("break");
        setTimeout(()=>{setTime(300);setTotal(300);},0);
        showToast("🍅 Pomodoro done! 5-min break time!");
      }else{
        setPhase("work");
        setTimeout(()=>{setTime(1500);setTotal(1500);},0);
        showToast("🎯 Break over! Back to work!");
        setRunning(false);
      }
    }else{
      setRunning(false);
      showToast("⏰ Timer complete! Great work!");
    }
  },[time,running,mode,phase,showToast]);

  useEffect(()=>{if(time>0)prevTimeRef.current=time;},[time]);
  const reset=()=>{setRunning(false);clearInterval(intRef.current);prevTimeRef.current=null;if(mode==="pomodoro"){setTime(1500);setTotal(1500);setPhase("work");}else if(mode==="custom"){const s=mins*60;setTime(s);setTotal(s);}else{setStudy(0);}};
  const pct=mode==="study"?0.75:(total>0?time/total:0);
  const R=42,C=2*Math.PI*R,dash=C*pct;
  const col=phase==="break"?"#60a5fa":mode==="study"?"#34d399":O;
  return<div style={{position:"fixed",top:68,right:16,zIndex:1000,background:CARD,border:`2px solid ${O}44`,borderRadius:18,padding:18,width:240,boxShadow:"0 8px 40px rgba(0,0,0,0.6)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <span style={{fontWeight:800,color:O,fontSize:13}}>⏱ Study Timer</span>
      <button onClick={onClose} style={{background:"transparent",border:"none",color:"#8b949e",cursor:"pointer",fontSize:16}}>✕</button>
    </div>
    <div style={{display:"flex",gap:3,marginBottom:14}}>
      {[["pomodoro","🍅 Pomo"],["custom","⏲ Custom"],["study","📚 Study"]].map(([m,l])=><button key={m} onClick={()=>{setMode(m);setRunning(false);if(m==="pomodoro"){setTime(1500);setTotal(1500);setPhase("work");}else if(m==="custom"){const s=mins*60;setTime(s);setTotal(s);}else{setStudy(0);}}} style={{flex:1,padding:"4px 2px",background:mode===m?col:"transparent",border:`1px solid ${mode===m?col:BORDER}`,color:mode===m?"#fff":"#8b949e",borderRadius:6,cursor:"pointer",fontSize:9,fontWeight:700}}>{l}</button>)}
    </div>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:14}}>
      <svg width={100} height={100} viewBox="0 0 100 100">
        <circle cx={50} cy={50} r={R} fill="none" stroke={BORDER} strokeWidth={7}/>
        <circle cx={50} cy={50} r={R} fill="none" stroke={col} strokeWidth={7} strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={C-dash} transform="rotate(-90 50 50)" style={{transition:"stroke-dashoffset 0.8s ease"}}/>
        <text x={50} y={47} textAnchor="middle" fill="#e6edf3" fontSize={16} fontWeight="800">{mode==="study"?fmt(study):fmt(time)}</text>
        <text x={50} y={62} textAnchor="middle" fill="#8b949e" fontSize={8}>{mode==="pomodoro"?(phase==="work"?"FOCUS":"BREAK"):mode==="custom"?"CUSTOM":"STUDY TIME"}</text>
      </svg>
      {mode==="pomodoro"&&<div style={{fontSize:10,color:"#8b949e",marginTop:2}}>🍅 {sessions} sessions completed</div>}
      {mode==="custom"&&!running&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:6}}>
        <input type="number" min={1} max={180} value={mins} onChange={e=>{const v=parseInt(e.target.value,10)||25;setMins(v);const s=v*60;setTime(s);setTotal(s);}} style={{background:"#0d1117",border:`1px solid ${BORDER}`,color:"#e6edf3",borderRadius:6,padding:"3px 6px",width:55,fontSize:12,textAlign:"center"}}/>
        <span style={{fontSize:11,color:"#8b949e"}}>min</span>
      </div>}
    </div>
    <div style={{display:"flex",gap:6}}>
      <button onClick={()=>setRunning(!running)} style={{flex:1,background:running?"#ef4444":col,border:"none",color:"#fff",borderRadius:8,padding:"8px 0",cursor:"pointer",fontWeight:800,fontSize:13}}>{running?"⏸ Pause":"▶ Start"}</button>
      <button onClick={reset} style={{background:"transparent",border:`1px solid ${BORDER}`,color:"#8b949e",borderRadius:8,padding:"8px 10px",cursor:"pointer",fontSize:13}}>↺</button>
    </div>
  </div>;
}

        </div>
        {(course.grades||[]).map(g=>{const pct=g.score!==""&&g.maxScore>0?(parseFloat(g.score)/parseFloat(g.maxScore))*100:null;return<div key={g.id} style={{display:"grid",gridTemplateColumns:"2fr 60px 60px 60px auto",gap:5,marginBottom:5,alignItems:"center"}}>
          <input spellCheck style={si} placeholder="Name" value={g.name} onChange={e=>upG(g.id,{name:e.target.value})}/>
          <input style={{...si,borderColor:pct!==null?gc(pct)+"66":BORDER}} type="number" value={g.weight} onChange={e=>upG(g.id,{weight:parseFloat(e.target.value)||0})}/>
          <input style={{...si,borderColor:pct!==null?gc(pct)+"88":BORDER}} type="number" placeholder="Score" value={g.score} onChange={e=>upG(g.id,{score:e.target.value})}/>
          <input style={si} type="number" placeholder="Max" value={g.maxScore} onChange={e=>upG(g.id,{maxScore:parseFloat(e.target.value)||100})}/>
          <button onClick={()=>rmG(g.id)} style={{background:"#ef4444",border:"none",color:"#fff",borderRadius:4,padding:"4px 6px",cursor:"pointer",fontSize:10}}>✕</button>
        </div>;})}
        {!course.grades?.length&&<div style={{color:"#8b949e",fontSize:12}}>No grades yet — upload syllabus or add manually.</div>}

      {tab==="events"&&<div>

        </div>
        {(course.events||[]).map(ev=><div key={ev.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr auto",gap:5,marginBottom:5,alignItems:"center"}}>
          <input spellCheck style={si} placeholder="Event title" value={ev.title} onChange={e=>upEv(ev.id,{title:e.target.value})}/>

          <button onClick={()=>rmEv(ev.id)} style={{background:"#ef4444",border:"none",color:"#fff",borderRadius:4,padding:"4px 6px",cursor:"pointer",fontSize:10}}>✕</button>
        </div>)}
        {!course.events?.length&&<div style={{color:"#8b949e",fontSize:12}}>No events yet.</div>}
      </div>}
      {tab==="tasks"&&<div>

        {MOS_DAYS.map((day,di)=><div key={day} style={{marginBottom:10}}>

            <select style={{...si,opacity:t.done?0.5:1}} value={t.cat} onChange={e=>upT(day,t.id,{cat:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
            <input spellCheck style={{...si,opacity:t.done?0.5:1,textDecoration:t.done?"line-through":"none"}} placeholder="Note..." value={t.note} onChange={e=>upT(day,t.id,{note:e.target.value})}/>
            <button onClick={()=>rmT(day,t.id)} style={{background:"#ef4444",border:"none",color:"#fff",borderRadius:4,padding:"3px 5px",cursor:"pointer",fontSize:9}}>✕</button>

                <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{background:"transparent",border:`1px solid ${cc.a}`,color:cc.a,borderRadius:7,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:700}}>🔄 Re-upload</button>

}

function Calendar({courses,extraEvents,onAddReminder,showToast}){
  const [cDate,setCDate]=useState(()=>{const n=new Date();return new Date(n.getFullYear(),n.getMonth(),1);});
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [nr,setNr]=useState({title:"",date:"",type:"reminder",description:"",email:""});
  const y=cDate.getFullYear(),m=cDate.getMonth();
  const allEv=[...SU_EVENTS,...extraEvents,...courses.flatMap(c=>(c.events||[]).map(e=>({...e,courseName:c.name,courseAcc:(CCOLS[c.ci]||CCOLS[0]).a})))];
  const byDay={};allEv.forEach(e=>{if(!byDay[e.date])byDay[e.date]=[];byDay[e.date].push(e);});
  const pad=firstDay(y,m)===0?6:firstDay(y,m)-1;
  const cells=[...Array(pad).fill(null),...Array(daysInMonth(y,m)).fill(0).map((_,i)=>i+1)];
  const sk=sel?`${y}-${String(m+1).padStart(2,"0")}-${String(sel).padStart(2,"0")}`:null;
  const selEv=sk?byDay[sk]||[]:[];
  const today=todayYMD();
  const upcoming=allEv.filter(e=>e.date>=today&&e.type!=="su").sort((a,b)=>a.date.localeCompare(b.date)).slice(0,15);
  const emailReminder=()=>{
    if(!nr.email){showToast("Enter your email in the 'Add Reminder' form first to use email reminders.");return;}
    const body=`MY ORANGE SUCCESS — Upcoming Deadlines\n\n${upcoming.map(e=>`📌 ${e.title}\n   Date: ${fmtDate(e.date)}\n   Type: ${EVTYPE[e.type]?.l||e.type}${e.courseName?"\n   Course: "+e.courseName:""}`).join("\n\n")}`;
    window.open(`mailto:${nr.email}?subject=MY Orange Success - Upcoming Deadlines&body=${encodeURIComponent(body)}`);
  };
  const textReminder=()=>{const text=`📚 MY ORANGE SUCCESS\nUpcoming:\n${upcoming.slice(0,8).map(e=>`• ${e.title} — ${fmtDate(e.date)}`).join("\n")}`;navigator.clipboard?.writeText(text).then(()=>showToast("📱 Reminder copied — paste into any text/SMS!")).catch(()=>showToast("Copy unavailable — try manually"));};
  const notifReminder=()=>{if(!("Notification"in window)){showToast("Notifications not supported in this browser.");return;}Notification.requestPermission().then(p=>{if(p==="granted"){const next=upcoming[0];try{if(next)new Notification(`🍊 Upcoming: ${next.title}`,{body:fmtDate(next.date)});}catch{}showToast("🔔 Browser notifications enabled!");}else showToast("Permission denied — enable notifications in browser settings.");});};
  const si={background:"#0d1117",border:`1px solid ${BORDER}`,color:"#e6edf3",borderRadius:8,padding:"7px 10px",fontSize:12,width:"100%",marginBottom:8};
  return<div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>{setCDate(new Date(y,m-1,1));setSel(null);}} style={{background:CARD,border:`1px solid ${BORDER}`,color:"#e6edf3",borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>◀</button>
        <div style={{fontWeight:800,fontSize:15,color:O}}>{MONTHS[m]} {y}</div>
        <button onClick={()=>{setCDate(new Date(y,m+1,1));setSel(null);}} style={{background:CARD,border:`1px solid ${BORDER}`,color:"#e6edf3",borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>▶</button>
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        <button onClick={()=>{setCDate(new Date(2026,8,1));setSel(null);}} style={{background:"transparent",border:`1px solid ${BORDER}`,color:"#8b949e",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:10}}>Fall 2026</button>
        <button onClick={()=>{setCDate(new Date(2027,0,1));setSel(null);}} style={{background:"transparent",border:`1px solid ${BORDER}`,color:"#8b949e",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:10}}>Spring 2027</button>
        <button onClick={emailReminder} style={{background:"#3b82f622",border:`1px solid #3b82f644`,color:"#60a5fa",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:10,fontWeight:700}}>📧 Email</button>
        <button onClick={textReminder} style={{background:"#34d39922",border:`1px solid #34d39944`,color:"#34d399",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:10,fontWeight:700}}>📱 Text</button>
        <button onClick={notifReminder} style={{background:`${O}22`,border:`1px solid ${O}44`,color:O,borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:10,fontWeight:700}}>🔔 Notify</button>
        <button onClick={()=>setShowAdd(!showAdd)} style={{background:O,border:"none",color:"#fff",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:10,fontWeight:700}}>+ Reminder</button>
      </div>
    </div>
    {showAdd&&<div style={{background:CARD,border:`1px solid ${O}44`,borderRadius:10,padding:14,marginBottom:14}}>
      <div style={{fontWeight:700,color:O,marginBottom:10,fontSize:13}}>Add Reminder</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <input spellCheck style={si} placeholder="Reminder title" value={nr.title} onChange={e=>setNr({...nr,title:e.target.value})}/>
        <input style={si} type="date" value={nr.date} onChange={e=>setNr({...nr,date:e.target.value})}/>
        <input spellCheck style={si} placeholder="Description (optional)" value={nr.description} onChange={e=>setNr({...nr,description:e.target.value})}/>
        <input style={si} type="email" placeholder="Your email (for reminders)" value={nr.email} onChange={e=>setNr({...nr,email:e.target.value})}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{if(!nr.title||!nr.date){showToast("Add a title and date for the reminder.");return;}onAddReminder({...nr,id:`rem-${Date.now()}`});setNr({title:"",date:"",type:"reminder",description:"",email:""});setShowAdd(false);showToast("🔔 Reminder added to calendar!");}} style={{background:O,border:"none",color:"#fff",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontWeight:700,fontSize:12}}>Save</button>
        <button onClick={()=>setShowAdd(false)} style={{background:"transparent",border:`1px solid ${BORDER}`,color:"#8b949e",borderRadius:6,padding:"6px 10px",cursor:"pointer",fontSize:12}}>Cancel</button>
      </div>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:2}}>
      {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#8b949e",padding:"4px 0"}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
      {cells.map((day,i)=>{
        if(!day)return<div key={`p${i}`}/>;
        const k=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const evs=byDay[k]||[];const isT=k===today;const isS=day===sel;
        return<div key={day} onClick={()=>setSel(day===sel?null:day)} style={{background:isS?O+"22":isT?NAVY+"88":"transparent",border:`1px solid ${isS?O:isT?O+"44":BORDER}`,borderRadius:5,padding:"3px 2px",minHeight:52,cursor:"pointer"}}>
          <div style={{fontSize:10,fontWeight:isT?800:400,color:isT?O:isS?"#fff":"#8b949e",textAlign:"center",marginBottom:1}}>{day}</div>
          {evs.slice(0,3).map((ev,ei)=><div key={ei} style={{background:(ev.courseAcc||EVTYPE[ev.type]?.c||"#94a3b8")+"33",borderLeft:`2px solid ${ev.courseAcc||EVTYPE[ev.type]?.c||"#94a3b8"}`,borderRadius:2,padding:"1px 2px",fontSize:8,color:"#e6edf3",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",marginBottom:1}}>{ev.title}</div>)}
          {evs.length>3&&<div style={{fontSize:8,color:"#8b949e",textAlign:"center"}}>+{evs.length-3}</div>}
        </div>;
      })}
    </div>
    {sel&&<div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:14,marginTop:10}}>
      <div style={{fontWeight:700,color:O,marginBottom:8,fontSize:14}}>📅 {MONTHS[m]} {sel}, {y}</div>
      {selEv.length===0?<div style={{color:"#8b949e",fontSize:13}}>No events on this day.</div>:
      selEv.map((ev,i)=><div key={ev.id||`ev_${i}`} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:`1px solid ${BORDER}`,alignItems:"flex-start"}}>
        <div style={{width:9,height:9,borderRadius:"50%",background:ev.courseAcc||EVTYPE[ev.type]?.c||"#94a3b8",marginTop:4,flexShrink:0}}/>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{ev.icon||""} {ev.title}</div>{ev.courseName&&<div style={{fontSize:10,color:"#8b949e"}}>{ev.courseName}</div>}{ev.description&&<div style={{fontSize:10,color:"#8b949e"}}>{ev.description}</div>}</div>
        <div style={{fontSize:9,color:EVTYPE[ev.type]?.c||"#94a3b8",fontWeight:700,background:(EVTYPE[ev.type]?.c||"#94a3b8")+"22",borderRadius:4,padding:"2px 5px",flexShrink:0}}>{EVTYPE[ev.type]?.l||ev.type}</div>
      </div>)}
    </div>}
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
      {Object.entries(EVTYPE).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:"50%",background:v.c}}/><span style={{fontSize:9,color:"#8b949e"}}>{v.l}</span></div>)}
    </div>
  </div>;
}

function WeeklyPlanner({courses,weeklyTasks,setWeeklyTasks,showToast}){
  const [wo,setWo]=useState(0);
  const wDates=getWeekDates(wo);
  const monday=getMondayDate(wo);
  const wLabel=`${MONTHS[monday.getMonth()].slice(0,3)} ${monday.getDate()} – ${MONTHS[new Date(monday.getTime()+6*864e5).getMonth()].slice(0,3)} ${new Date(monday.getTime()+6*864e5).getDate()}, ${new Date(monday.getTime()+6*864e5).getFullYear()}`;
  const addTask=(dk,cid)=>{setWeeklyTasks(prev=>({...prev,[dk]:[...(prev[dk]||[]),{id:Date.now()+"_"+Math.random().toString(36).slice(2,6),courseId:cid,cat:"Homework",note:"",done:false}]}));};
  const updTask=(dk,tid,f)=>setWeeklyTasks(prev=>({...prev,[dk]:(prev[dk]||[]).map(t=>t.id===tid?{...t,...f}:t)}));
  const rmTask=(dk,tid)=>setWeeklyTasks(prev=>({...prev,[dk]:(prev[dk]||[]).filter(t=>t.id!==tid)}));
  const toggleTask=(dk,tid)=>{
    // Read done state for the motivational toast — acceptable stale read for UI-only effect
    const t=(weeklyTasks[dk]||[]).find(x=>x.id===tid);
    if(t&&!t.done)showToast(MOTIV[Math.floor(Math.random()*MOTIV.length)]);
    // Use functional updater so the actual toggle always operates on latest state
    setWeeklyTasks(prev=>{
      const tasks=prev[dk]||[];

function AIChat({courses,allEvents}){
  const [msgs,setMsgs]=useState([{id:"init",role:"assistant",content:"👋 Hi! I'm your Orange Success AI Coach, powered by Claude. Ask me anything — study strategies, concept explanations, exam prep, time management, or what's coming up on your calendar. Let's crush this semester! 🍊"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const buildSys=()=>{
    const cl=courses.map(c=>{const a=getCourseAvg(c);return`- ${c.name} (${c.code}, ${c.credits} cr)${a!==null?`, grade: ${avgToLetter(a)} (${a.toFixed(1)}%)`:""}`; }).join("\n");
    const today=todayYMD();
    const up=allEvents.filter(e=>e.date>=today&&e.type!=="su").sort((a,b)=>a.date.localeCompare(b.date)).slice(0,10).map(e=>`- ${e.title} due ${fmtDate(e.date)}${e.courseName?" ("+e.courseName+")":""}`).join("\n");
    return`You are an academic success coach for a Syracuse University student using MY ORANGE SUCCESS planner. Be warm, encouraging, and practical.\n\nCourses:\n${cl||"Not entered yet"}\n\nUpcoming deadlines:\n${up||"None entered"}\n\nHelp with: study strategies, concepts, exam prep, writing, time management. Keep responses under 200 words unless more detail requested. Always end with an encouraging note.`;
  };
  const send=async()=>{
    if(!input.trim()||loading)return;
    const um={id:`u_${Date.now()}`,role:"user",content:input.trim()};
    setMsgs(m=>[...m,um]);setInput("");setLoading(true);
    try{
      // Exclude the initial greeting (role:"assistant") before sending to API
      // Anthropic requires messages[0].role === "user"
      const history=[...msgs.filter(m=>m.id!=="init"),um].slice(-20);
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL,max_tokens:800,system:buildSys(),messages:history.map(m=>({role:m.role,content:m.content}))})});
      if(!r.ok)throw new Error(`API ${r.status}`);
      const d=await r.json();setMsgs(m=>[...m,{id:`a_${Date.now()}`,role:"assistant",content:d.content?.[0]?.text||"Sorry, I couldn't respond. Try again!"}]);
    }catch(e){setMsgs(m=>[...m,{id:`e_${Date.now()}`,role:"assistant",content:`Connection issue (${e.message||"unknown"}) — please try again!`}]);}
    finally{setLoading(false);}
  };
  const PROMPTS=["What's due this week?","Help me build a study plan","Explain active recall","How do I write a strong thesis?","Motivate me! 🔥","Best note-taking strategies?"];
  return<div style={{display:"flex",flexDirection:"column",height:"72vh",gap:10}}>
    <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"8px 10px",display:"flex",flexWrap:"wrap",gap:5}}>
      {PROMPTS.map(p=><button key={p} onClick={()=>setInput(p)} style={{background:`${O}18`,border:`1px solid ${O}33`,color:O,borderRadius:16,padding:"3px 9px",cursor:"pointer",fontSize:10,fontWeight:600}}>{p}</button>)}
    </div>
    <div style={{flex:1,overflow:"auto",background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:14,display:"flex",flexDirection:"column",gap:10}}>
      {msgs.map((m)=><div key={m.id} style={{display:"flex",gap:8,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
        {m.role==="assistant"&&<div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${O},#ff9a3c)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>🍊</div>}
        <div style={{maxWidth:"76%",background:m.role==="user"?`${O}28`:"#1c2128",border:`1px solid ${m.role==="user"?O+"44":BORDER}`,borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px",padding:"9px 13px",fontSize:13,lineHeight:1.65,color:"#e6edf3",whiteSpace:"pre-wrap"}}>{m.content}</div>
      </div>)}
      {loading&&<div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${O},#ff9a3c)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🍊</div>
        <div style={{background:"#1c2128",border:`1px solid ${BORDER}`,borderRadius:"4px 16px 16px 16px",padding:"9px 13px",fontSize:13,color:"#8b949e"}}>Thinking<span style={{animation:"blink 1.2s infinite"}}>...</span></div>
      </div>}
      <div ref={bottomRef}/>
    </div>
    <div style={{display:"flex",gap:8}}>
      <input spellCheck value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask your AI coach anything... (Enter to send)" style={{flex:1,background:CARD,border:`1px solid ${BORDER}`,color:"#e6edf3",borderRadius:10,padding:"10px 14px",fontSize:13,fontFamily:"inherit"}}/>
      <button onClick={send} disabled={loading||!input.trim()} style={{background:loading||!input.trim()?BORDER:O,border:"none",color:"#fff",borderRadius:10,padding:"10px 16px",cursor:loading||!input.trim()?"not-allowed":"pointer",fontWeight:800,fontSize:15}}>→</button>
      <button onClick={()=>setMsgs([msgs[0]])} title="Clear chat" style={{background:"transparent",border:`1px solid ${BORDER}`,color:"#8b949e",borderRadius:10,padding:"10px 12px",cursor:"pointer",fontSize:12}}>↺</button>
    </div>
  </div>;
}

/* ════════════ NEW: MY TOOL BOX COMPONENT ════════════ */
function ToolBox({files,setFiles,showToast,readOnly=false}){
  const [dragging,setDragging]=useState(false);
  const fileRef=useRef(null);
  const getIcon=(type)=>{
    if(!type)return"📎";
    for(const [k,v] of Object.entries(FILE_ICONS)){if(type.startsWith(k)||type.includes(k))return v;}
    return"📎";
  };
  const fmtSize=(b)=>b>1048576?`${(b/1048576).toFixed(1)} MB`:b>1024?`${(b/1024).toFixed(0)} KB`:`${b} B`;

  const processFiles=(fileList)=>{
    Array.from(fileList).forEach(file=>{
      if(file.size>1048576){showToast(`⚠️ ${file.name} is over 1MB — try a smaller file`);return;}
      const reader=new FileReader();
      reader.onload=(e)=>{
        const id=Date.now()+"_"+Math.random().toString(36).slice(2,5);
        setFiles(prev=>[...prev,{id,name:file.name,size:file.size,type:file.type,uploadDate:todayYMD(),dataUrl:e.target.result}]);
        showToast(`📎 "${file.name}" added to Tool Box!`);
      };
      reader.onerror=()=>showToast(`⚠️ Failed to read "${file.name}" — file may be corrupted or inaccessible`);
      reader.readAsDataURL(file);
    });
  };

  const del=(id)=>{setFiles(prev=>prev.filter(f=>f.id!==id));showToast("🗑️ File removed");};
  const download=(f)=>{
    const a=document.createElement("a");
    a.href=f.dataUrl;a.download=f.name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontWeight:800,color:O,fontSize:15,marginBottom:2}}>🧰 My Tool Box</div>
          <div style={{fontSize:11,color:"#8b949e"}}>Upload syllabi, notes, handouts, and study materials — all in one place</div>
        </div>
        <div style={{background:`${O}15`,border:`1px solid ${O}33`,borderRadius:8,padding:"4px 12px",fontSize:11,color:O,fontWeight:700}}>{files.length} file{files.length!==1?"s":""}</div>
      </div>

      {/* Upload zone — hidden for read-only viewers */}

/* ════════════ NEW: STICKY NOTES LAYER ════════════ */
function StickyNotesLayer({notes,setNotes}){
  const [open,setOpen]=useState(false);
  const [newText,setNewText]=useState("");
  const [newColor,setNewColor]=useState(NOTE_COLORS[0]);
  const dragCleanupRef=useRef(null); // holds the active drag cleanup fn for unmount safety

  // Remove any active drag listeners when the component unmounts
  useEffect(()=>()=>{if(dragCleanupRef.current){dragCleanupRef.current();dragCleanupRef.current=null;}},[]);

  const addNote=()=>{
    if(!newText.trim())return;
    const id=Date.now()+"";
    // Scatter notes near top of viewport, avoid stacking on each other
    const vw=window.innerWidth||800;
    const rawX=80+(notes.length%3)*220+Math.random()*40;
    const x=Math.min(rawX,Math.max(10,vw-240)); // clamp to viewport width minus note width
    const y=90+(notes.length%2)*170+Math.random()*30;
    setNotes(prev=>[...prev,{id,text:newText.trim(),color:newColor,x,y}]);
    setNewText("");
    setOpen(false);
  };

  const delNote=(id)=>setNotes(prev=>prev.filter(n=>n.id!==id));
  const updNote=(id,changes)=>setNotes(prev=>prev.map(n=>n.id===id?{...n,...changes}:n));

  const startDrag=(e,id)=>{
    if(e.target.tagName==="TEXTAREA"||e.target.tagName==="BUTTON")return;
    e.preventDefault();
    // Clean up any still-active drag before starting a new one
    if(dragCleanupRef.current){dragCleanupRef.current();dragCleanupRef.current=null;}
    const note=notes.find(n=>n.id===id);
    if(!note)return;
    const ox=e.clientX-note.x,oy=e.clientY-note.y;
    const onMove=(me)=>updNote(id,{x:me.clientX-ox,y:me.clientY-oy});
    const onUp=()=>{
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
      dragCleanupRef.current=null;
    };
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
    // Store cleanup so unmount can remove listeners if drag is still active
    dragCleanupRef.current=()=>{
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    };
  };

  return(
    <>
      {/* Floating sticky notes */}
      {notes.map(n=>(
        <div key={n.id} className="sticky-note" onMouseDown={e=>startDrag(e,n.id)} style={{
          position:"fixed",left:n.x,top:n.y,zIndex:750,width:210,
          background:n.color,borderRadius:3,
          boxShadow:"3px 5px 18px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.3)",
          cursor:"grab",userSelect:"none",
          transform:"rotate("+((parseInt(n.id.slice(-4),36)%7)-3)+"deg)",
        }}>
          <div style={{
            background:"rgba(0,0,0,0.1)",padding:"6px 8px 5px",
            display:"flex",justifyContent:"space-between",alignItems:"center",
            borderRadius:"3px 3px 0 0",
          }}>
            <span style={{fontSize:9,fontWeight:800,color:"rgba(0,0,0,0.55)",letterSpacing:0.5}}>📌 STICKY</span>
            <button
              onMouseDown={e=>e.stopPropagation()}
              onClick={()=>delNote(n.id)}
              style={{background:"rgba(0,0,0,0.18)",border:"none",color:"rgba(0,0,0,0.6)",cursor:"pointer",fontSize:11,width:18,height:18,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,lineHeight:1,padding:0}}
            >✕</button>
          </div>
          <textarea
            onMouseDown={e=>e.stopPropagation()}
            value={n.text}
            onChange={e=>updNote(n.id,{text:e.target.value})}
            style={{
              width:"100%",minHeight:80,background:"transparent",border:"none",
              padding:"8px 10px 10px",fontSize:12,color:"rgba(0,0,0,0.8)",
              resize:"both",fontFamily:"'Segoe UI',Georgia,sans-serif",
              lineHeight:1.55,outline:"none",cursor:"text",
            }}
          />
        </div>
      ))}

      {/* Create panel */}
      {open&&(
        <div style={{position:"fixed",bottom:72,right:16,zIndex:900,background:CARD,border:`2px solid ${O}55`,borderRadius:16,padding:18,width:268,boxShadow:"0 10px 50px rgba(0,0,0,0.7)"}}>
          <div style={{fontWeight:800,color:O,fontSize:13,marginBottom:10}}>📌 New Sticky Note</div>
          <textarea
            autoFocus
            value={newText}
            onChange={e=>setNewText(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&e.metaKey)addNote();}}
            placeholder="What's on your mind?&#10;(⌘+Enter to post)"
            style={{width:"100%",minHeight:90,background:"#0d1117",border:`1px solid ${BORDER}`,color:"#e6edf3",borderRadius:8,padding:10,fontSize:12,resize:"none",fontFamily:"inherit",outline:"none",lineHeight:1.6,marginBottom:10}}
          />
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:"#8b949e",marginBottom:5,fontWeight:700}}>NOTE COLOR</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {NOTE_COLORS.map(c=>(
                <button key={c} onClick={()=>setNewColor(c)} style={{
                  width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",
                  border:newColor===c?"3px solid #fff":"2px solid rgba(255,255,255,0.2)",
                  boxShadow:newColor===c?"0 0 0 2px "+O:"none",
                  transition:"all 0.15s",
                }}/>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={addNote} disabled={!newText.trim()} style={{
              flex:1,background:newText.trim()?`linear-gradient(135deg,${O},#ff9a3c)`:BORDER,
              border:"none",color:"#fff",borderRadius:8,padding:"8px 0",
              cursor:newText.trim()?"pointer":"not-allowed",fontWeight:800,fontSize:12,
            }}>📌 Post Note</button>
            <button onClick={()=>setOpen(false)} style={{background:"transparent",border:`1px solid ${BORDER}`,color:"#8b949e",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:11}}>Cancel</button>
          </div>
          {notes.length>0&&(
            <div style={{fontSize:10,color:"#8b949e",marginTop:8,textAlign:"center"}}>
              {notes.length} note{notes.length!==1?"s":""} active · drag to reposition · resize from corner
            </div>
          )}
        </div>
      )}

      {/* Floating button */}
      <button
        onClick={()=>setOpen(p=>!p)}
        title={open?"Close":"Create sticky note"}
        style={{
          position:"fixed",bottom:16,right:16,zIndex:950,
          background:open?"#1c2128":`linear-gradient(135deg,${O},#ff9a3c)`,
          border:open?`2px solid ${O}`:"none",
          color:open?O:"#fff",
          borderRadius:"50%",width:50,height:50,
          cursor:"pointer",fontSize:20,
          boxShadow:`0 4px 24px ${open?O+"44":"rgba(247,105,0,0.45)"}`,
          display:"flex",alignItems:"center",justifyContent:"center",
          transition:"all 0.2s",
        }}
      >{open?"✕":"📌"}</button>
    </>
  );
}
